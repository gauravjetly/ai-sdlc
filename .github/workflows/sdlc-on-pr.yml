# AI-SDLC GitHub Actions Integration
# Automatically triggers SDLC code review on pull requests

name: AI-SDLC Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sdlc-review:
    name: SDLC Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            src/**
            lib/**
            app/**
            *.ts
            *.js
            *.py
            *.go

      - name: Setup Node.js
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Review Summary
        if: steps.changed-files.outputs.any_changed == 'true'
        id: review
        run: |
          echo "## AI-SDLC Review Summary" > review.md
          echo "" >> review.md
          echo "**PR:** #${{ github.event.pull_request.number }}" >> review.md
          echo "**Branch:** ${{ github.head_ref }}" >> review.md
          echo "**Files Changed:** ${{ steps.changed-files.outputs.all_changed_files_count }}" >> review.md
          echo "" >> review.md

          echo "### Changed Files" >> review.md
          echo '```' >> review.md
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' >> review.md
          echo '```' >> review.md
          echo "" >> review.md

          echo "### Review Checklist" >> review.md
          echo "- [ ] Security review completed" >> review.md
          echo "- [ ] Tests pass" >> review.md
          echo "- [ ] Code follows standards" >> review.md
          echo "- [ ] Documentation updated (if needed)" >> review.md
          echo "" >> review.md

          echo "---" >> review.md
          echo "*Generated by AI-SDLC GitHub Integration*" >> review.md

          # Output for PR comment
          {
            echo 'REVIEW_BODY<<EOF'
            cat review.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.review.outputs.REVIEW_BODY }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Run linting (if configured)
        if: steps.changed-files.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            npm ci --ignore-scripts 2>/dev/null || true
            npm run lint 2>/dev/null || echo "No lint script"
          fi

      - name: Run tests (if configured)
        if: steps.changed-files.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            npm test 2>/dev/null || echo "No test script or tests failed"
          fi

  security-check:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        if: hashFiles('package-lock.json') != ''
        continue-on-error: true
        run: npm audit --audit-level=high || true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Security summary
        run: |
          echo "## Security Check Complete"
          echo "- npm audit: checked"
          echo "- Secret scanning: checked"
