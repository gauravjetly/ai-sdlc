# Continuous Integration
# Runs tests and security checks on all PRs

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || echo "No package.json"

      - name: Run linting
        run: npm run lint 2>/dev/null || echo "No lint script"

      - name: Run tests
        run: npm test 2>/dev/null || echo "No test script"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: hashFiles('coverage/lcov.info') != ''
        with:
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  build-test:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (test)
        if: hashFiles('src/platform/api/Dockerfile') != ''
        uses: docker/build-push-action@v5
        with:
          context: src/platform/api
          file: src/platform/api/Dockerfile
          push: false
          tags: catalyst-api:test

      - name: Build UI image (test)
        if: hashFiles('src/platform/ui/Dockerfile') != ''
        uses: docker/build-push-action@v5
        with:
          context: src/platform/ui
          file: src/platform/ui/Dockerfile
          push: false
          tags: catalyst-ui:test

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'infrastructure/terraform')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Format
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/catalyst-dev
        run: |
          terraform init -backend=false
          terraform validate
