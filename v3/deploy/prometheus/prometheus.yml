global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: ai-sdlc
    env:     production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: aisdlc-api
    static_configs:
      - targets: [aisdlc-api:8000]
    metrics_path: /api/v1/metrics

  - job_name: aisdlc-mcp
    static_configs:
      - targets: [aisdlc-mcp:8765]
    metrics_path: /metrics

  - job_name: chromadb
    static_configs:
      - targets: [chromadb:8001]

  - job_name: redis
    static_configs:
      - targets: [redis:6379]

  - job_name: postgres
    static_configs:
      - targets: [postgres:5432]
