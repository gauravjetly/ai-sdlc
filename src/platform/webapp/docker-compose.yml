version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: harmony-postgres
    environment:
      POSTGRES_DB: harmony
      POSTGRES_USER: harmony
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmony"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harmony-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: harmony-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - harmony-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harmony-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://harmony:${POSTGRES_PASSWORD:-changeme}@postgres:5432/harmony
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - harmony-network

  # Frontend UI
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: harmony-webapp
    ports:
      - "80:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - harmony-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  harmony-network:
    driver: bridge
