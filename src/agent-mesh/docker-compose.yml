version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: agent-mesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_mesh
      POSTGRES_USER: agent_mesh
      POSTGRES_PASSWORD: agent_mesh_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_mesh -d agent_mesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-mesh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
