    function Projects({ projects, costs, onProjectClick }) {
      const [searchQuery, setSearchQuery] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [showArchived, setShowArchived] = useState(false);
      const [archivedIds, setArchivedIds] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('sdlc-archived-projects') || '[]');
        } catch { return []; }
      });

      // Archive/unarchive project
      const toggleArchive = (projectId) => {
        setArchivedIds(prev => {
          const newArchived = prev.includes(projectId)
            ? prev.filter(id => id !== projectId)
            : [...prev, projectId];
          localStorage.setItem('sdlc-archived-projects', JSON.stringify(newArchived));
          return newArchived;
        });
      };

      // Filter projects based on search, status, and archive state
      const filteredProjects = projects.filter(p => {
        // Archive filter
        const isArchived = archivedIds.includes(p.id);
        if (showArchived && !isArchived) return false;
        if (!showArchived && isArchived) return false;

        // Status filter
        if (statusFilter !== 'all') {
          const normalizedStatus = normalizeStatus(p.status);
          if (statusFilter === 'active' && !['active', 'in_progress'].includes(normalizedStatus)) return false;
          if (statusFilter === 'completed' && !['completed', 'complete'].includes(normalizedStatus)) return false;
          if (statusFilter === 'blocked' && normalizedStatus !== 'blocked') return false;
        }

        // Search filter
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          const name = (p.name || p.description || '').toLowerCase();
          const id = (p.id || '').toLowerCase();
          if (!name.includes(query) && !id.includes(query)) return false;
        }

        return true;
      });

      const archivedCount = projects.filter(p => archivedIds.includes(p.id)).length;

      if (projects.length === 0) {
        return (
          <div className="empty-state">
            <div className="empty-state-icon"><AgentIcon src="assets/brand/icons/data-workflow.svg" size={32} /></div>
            <div className="empty-state-title">No Projects</div>
            <p>Run /sdlc-start to begin or press <kbd>⌘K</kbd></p>
          </div>
        );
      }

      return (
        <div>
          {/* Search and Filter Bar */}
          <div className="projects-toolbar">
            <div className="search-box">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
              <input
                type="text"
                placeholder="Search projects..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="search-input"
              />
              {searchQuery && (
                <button className="search-clear" onClick={() => setSearchQuery('')}>×</button>
              )}
            </div>

            <div className="filter-group">
              <select
                value={statusFilter}
                onChange={(e) => setStatusFilter(e.target.value)}
                className="filter-select"
              >
                <option value="all">All Status</option>
                <option value="active">In Progress</option>
                <option value="completed">Completed</option>
                <option value="blocked">Blocked</option>
              </select>

              <button
                className={`filter-button ${showArchived ? 'active' : ''}`}
                onClick={() => setShowArchived(!showArchived)}
                title={showArchived ? 'Show active projects' : 'Show archived projects'}
              >
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>
                </svg>
                {showArchived ? 'Active' : 'Archived'}
                {archivedCount > 0 && !showArchived && <span className="archive-badge">{archivedCount}</span>}
              </button>
            </div>
          </div>

          {/* Results Info */}
          {(searchQuery || statusFilter !== 'all' || showArchived) && (
            <div className="filter-info">
              Showing {filteredProjects.length} of {projects.length} projects
              {searchQuery && <span> matching "{searchQuery}"</span>}
              {showArchived && <span className="archived-label"> (Archived)</span>}
            </div>
          )}

          {/* Projects List */}
          {filteredProjects.length === 0 ? (
            <div className="empty-state" style={{marginTop: '24px'}}>
              <div className="empty-state-icon">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--text-muted)" strokeWidth="1.5">
                  <circle cx="11" cy="11" r="8"/>
                  <path d="M21 21l-4.35-4.35"/>
                  <path d="M8 11h6"/>
                </svg>
              </div>
              <div className="empty-state-title">No matching projects</div>
              <p>Try adjusting your search or filters</p>
            </div>
          ) : (
            filteredProjects.map(p => (
              <ProjectCard
                key={p.id}
                project={p}
                costs={costs}
                isArchived={archivedIds.includes(p.id)}
                onToggleArchive={() => toggleArchive(p.id)}
                onClick={() => onProjectClick && onProjectClick(p)}
              />
            ))
          )}
        </div>
      );
    }

    function ProjectCard({ project, costs, isArchived = false, onToggleArchive, onClick }) {
      const cost = costs.find(c => c.project_id === project.id);

      // Normalize phases - handle both array format and object format
      const phasesMap = normalizePhasesArray(project.phases);

      // Count completed phases
      const completedCount = Object.values(phasesMap).filter(s =>
        s === 'completed' || s === 'complete'
      ).length;
      const progress = Math.round((completedCount / PIPELINE_AGENTS.length) * 100);

      const getStatus = (agentId) => {
        const status = phasesMap[agentId];
        if (!status) return 'pending';
        if (status === 'completed' || status === 'complete') return 'completed';
        if (status === 'active' || status === 'in_progress') return 'active';
        if (status === 'blocked') return 'blocked';
        return 'pending';
      };

      // Normalize project status for badge display
      const projectStatus = normalizeStatus(project.status);
      const badges = {
        completed: ['badge-success', 'Completed'],
        complete: ['badge-success', 'Completed'],
        active: ['badge-info', 'In Progress'],
        in_progress: ['badge-info', 'In Progress'],
        blocked: ['badge-danger', 'Blocked']
      };
      const badge = badges[projectStatus] || ['badge-warning', 'Pending'];

      // Get current active phase for display
      const currentPhase = getCurrentPhaseInfo(project.phases);

      return (
        <div className={`project-card ${isArchived ? 'archived' : ''}`} onClick={onClick} style={{ cursor: onClick ? 'pointer' : 'default' }}>
          <div className="project-header">
            <div>
              <h3 className="project-name">{project.description || project.name || project.id}</h3>
              <div className="project-id">{project.id}</div>
            </div>
            <div className="project-meta">
              {isArchived && <span className="badge badge-muted">Archived</span>}
              <span className={`badge ${badge[0]}`}>{badge[1]}</span>
              {cost && <div className="project-cost">${(cost.total_cost || 0).toFixed(2)}</div>}
              {onToggleArchive && (
                <button
                  className="archive-button"
                  onClick={(e) => { e.stopPropagation(); onToggleArchive(); }}
                  title={isArchived ? 'Restore project' : 'Archive project'}
                >
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2">
                    {isArchived ? (
                      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5M12 7v5l4 2"/>
                    ) : (
                      <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>
                    )}
                  </svg>
                </button>
              )}
            </div>
          </div>

          {/* Show current phase status for active projects */}
          {isActive(project) && currentPhase && (
            <div style={{ padding: '8px 24px', background: 'var(--deltek-light)', borderBottom: '1px solid var(--border-light)', display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'var(--deltek-blue)', animation: 'pulse 1.5s infinite' }}></span>
              <span style={{ fontSize: '13px', color: 'var(--deltek-blue)', fontWeight: 500 }}>
                {AGENTS.find(a => a.id === currentPhase.agent)?.name || currentPhase.agent} {currentPhase.status === 'in_progress' ? 'working...' : ''}
              </span>
            </div>
          )}

          <div className="agent-pipeline">
            {PIPELINE_AGENTS.map((id, i) => {
              const agent = AGENTS.find(a => a.id === id);
              const status = getStatus(id);
              return (
                <React.Fragment key={id}>
                  <div className="pipeline-agent">
                    <div className={`pipeline-icon ${status}`}><AgentIcon src={agent?.icon} size={16} /></div>
                    <span className="pipeline-name">{agent?.role}</span>
                  </div>
                  {i < PIPELINE_AGENTS.length - 1 && <div className={`pipeline-connector ${status === 'completed' ? 'completed' : ''}`}></div>}
                </React.Fragment>
              );
            })}
          </div>

          <div className="project-footer">
            <div className="project-progress">
              <div className="progress-label"><span>Progress</span><span>{progress}%</span></div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%`, background: project.status === 'blocked' ? '#d32f2f' : progress === 100 ? '#00875a' : '#0066cc' }}></div>
              </div>
            </div>
            <div className="project-time">
              {project.createdAt ? new Date(project.createdAt).toLocaleDateString() :
               project.created_at ? new Date(project.created_at).toLocaleDateString() : ''}
            </div>
          </div>
        </div>
      );
    }

    function Analytics({ costs, projects }) {
      const agentCosts = {};
      costs.forEach(c => (c.breakdown_by_agent || []).forEach(a => {
        if (!agentCosts[a.agent]) agentCosts[a.agent] = { cost: 0, invocations: 0, tokens: 0 };
        agentCosts[a.agent].cost += a.cost || 0;
        agentCosts[a.agent].invocations += a.invocations || 0;
        agentCosts[a.agent].tokens += a.tokens || 0;
      }));

      const totalCost = costs.reduce((s, c) => s + (c.total_cost || 0), 0);
      const totalTokens = costs.reduce((s, c) => s + (c.total_tokens || 0), 0);

      const modelUsage = {};
      AGENTS.forEach(a => { if (!modelUsage[a.model]) modelUsage[a.model] = 0; modelUsage[a.model] += agentCosts[a.id]?.invocations || 0; });

      return (
        <div>
          <div className="grid-4 mb-xl">
            <div className="metric-card"><span className="metric-label">Total Spent</span><span className="metric-value text-blue">${totalCost.toFixed(2)}</span></div>
            <div className="metric-card"><span className="metric-label">Total Tokens</span><span className="metric-value" style={{color:'#7b1fa2'}}>{(totalTokens/1000).toFixed(1)}K</span></div>
            <div className="metric-card"><span className="metric-label">Avg Cost/Project</span><span className="metric-value text-blue">${projects.length ? (totalCost/projects.length).toFixed(2) : '0.00'}</span></div>
            <div className="metric-card"><span className="metric-label">Cost per 1K Tokens</span><span className="metric-value text-green">${totalTokens ? ((totalCost/totalTokens)*1000).toFixed(4) : '0.00'}</span></div>
          </div>

          <div className="grid-2 mb-xl">
            <div className="chart-container">
              <div className="chart-header"><h3 className="chart-title">Model Distribution</h3></div>
              <div style={{padding:'16px 0'}}>
                {Object.entries(modelUsage).map(([m, c]) => {
                  const t = Object.values(modelUsage).reduce((a,b) => a+b, 0);
                  const p = t ? (c/t)*100 : 0;
                  const colors = { Opus: '#7b1fa2', Sonnet: '#0066cc', Haiku: '#00875a' };
                  return (
                    <div key={m} style={{marginBottom:'16px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                        <span style={{fontSize:'14px',fontWeight:500,color:'#1a2b3c'}}>{m}</span>
                        <span style={{fontSize:'14px',color:'#5a6b7c'}}>{c} calls ({p.toFixed(0)}%)</span>
                      </div>
                      <div className="progress-bar"><div className="progress-fill" style={{width:`${p}%`,background:colors[m] || '#0066cc'}}></div></div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="chart-container">
              <div className="chart-header"><h3 className="chart-title">Cost by Agent</h3></div>
              <div style={{padding:'16px 0'}}>
                {Object.entries(agentCosts).sort((a,b) => b[1].cost - a[1].cost).slice(0,6).map(([id, d]) => {
                  const agent = AGENTS.find(a => a.id === id);
                  const max = Math.max(...Object.values(agentCosts).map(x => x.cost), 1);
                  const p = (d.cost/max)*100;
                  return (
                    <div key={id} style={{marginBottom:'16px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                        <span style={{fontSize:'14px',color:'#1a2b3c'}}>{agent?.icon} {agent?.name}</span>
                        <span style={{fontSize:'14px',color:'#0066cc',fontWeight:500}}>${d.cost.toFixed(2)}</span>
                      </div>
                      <div className="progress-bar"><div className="progress-fill" style={{width:`${p}%`,background:agent?.color || '#0066cc'}}></div></div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Agents({ costs, onAgentClick }) {
      const agentCosts = {};
      costs.forEach(c => (c.breakdown_by_agent || []).forEach(a => {
        if (!agentCosts[a.agent]) agentCosts[a.agent] = { cost: 0, invocations: 0 };
        agentCosts[a.agent].cost += a.cost || 0;
        agentCosts[a.agent].invocations += a.invocations || 0;
      }));

      const core = AGENTS.filter(a => PIPELINE_AGENTS.includes(a.id) || a.id === 'conductor');
      const support = AGENTS.filter(a => ['ask-tom', 'finops', 'tracker'].includes(a.id));

      return (
        <div>
          <div className="section-header"><div><h3 className="section-title">Pipeline Agents</h3><p className="section-subtitle">Core SDLC workflow agents</p></div></div>
          <div className="grid-3 mb-xl">{core.map(a => <AgentCard key={a.id} agent={a} data={agentCosts[a.id]} onClick={() => onAgentClick && onAgentClick(a.id)} />)}</div>

          <div className="section-header"><div><h3 className="section-title">Support Agents</h3><p className="section-subtitle">On-demand specialist agents</p></div></div>
          <div className="grid-3">{support.map(a => <AgentCard key={a.id} agent={a} data={agentCosts[a.id]} onClick={() => onAgentClick && onAgentClick(a.id)} />)}</div>
        </div>
      );
    }

                justifyContent: 'center'
              }}>
                {unreadCount > 9 ? '9+' : unreadCount}
              </span>
            )}
          </button>

          {showNotifications && (
            <div style={{
              position: 'absolute',
              top: '100%',
              right: 0,
              marginTop: '8px',
              width: '380px',
              maxHeight: '480px',
              background: 'white',
              border: '1px solid var(--border-color)',
              borderRadius: 'var(--radius-lg)',
              boxShadow: 'var(--shadow-lg)',
              zIndex: 1000,
              overflow: 'hidden'
            }}>
              <div style={{
                padding: '12px 16px',
                borderBottom: '1px solid var(--border-color)',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                background: 'var(--bg-tertiary)'
              }}>
                <span style={{ fontWeight: 600, fontSize: '14px' }}>Notifications</span>
                <div style={{ display: 'flex', gap: '8px' }}>
                  {unreadCount > 0 && (
                    <button onClick={markAllRead} style={{ fontSize: '12px', color: 'var(--deltek-blue)', background: 'none', border: 'none', cursor: 'pointer' }}>
                      Mark all read
                    </button>
                  )}
                  {notifications.length > 0 && (
                    <button onClick={clearAll} style={{ fontSize: '12px', color: 'var(--text-muted)', background: 'none', border: 'none', cursor: 'pointer' }}>
                      Clear all
                    </button>
                  )}
                </div>
              </div>

              <div style={{ maxHeight: '400px', overflowY: 'auto' }}>
                {notifications.length === 0 ? (
                  <div style={{ padding: '32px', textAlign: 'center', color: 'var(--text-muted)' }}>
                    <div style={{ fontSize: '32px', marginBottom: '8px', opacity: 0.4 }}>🔔</div>
                    <div>No notifications yet</div>
                    <div style={{ fontSize: '12px', marginTop: '4px' }}>Activity will appear here as agents work</div>
                  </div>
                ) : (
                  notifications.map((notif, i) => {
                    const agent = AGENTS.find(a => a.id === notif.agent) || { icon: '🔄', color: '#607d8b' };
                    const typeColors = { start: '#0066cc', complete: '#00875a', blocked: '#d32f2f', create: '#7b1fa2' };
                    const color = typeColors[notif.type] || agent.color;
                    const bgColors = { '#0066cc': '#e6f0fa', '#00875a': '#e6f4ef', '#d32f2f': '#fdeaea', '#7b1fa2': '#f3e5f5' };
                    const bg = bgColors[color] || '#f5f7fa';

                    return (
                      <div
                        key={notif.id || i}
                        style={{
                          padding: '12px 16px',
                          borderBottom: '1px solid var(--border-light)',
                          background: notif.read ? 'white' : 'var(--deltek-light)',
                          display: 'flex',
                          gap: '12px',
                          alignItems: 'flex-start'
                        }}
                      >
                        <div style={{
                          width: '36px',
                          height: '36px',
                          borderRadius: '50%',
                          background: bg,
                          color: color,
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center',
                          fontSize: '16px',
                          flexShrink: 0
                        }}>
                          <AgentIcon src={agent.icon} size={16} />
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: '13px', color: 'var(--text-primary)', marginBottom: '2px' }}>
                            <strong>{agent.name || notif.agent}</strong> {notif.action}
                          </div>
                          <div style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'flex', justifyContent: 'space-between' }}>
                            <span>{notif.project}</span>
                            <span>{notif.timestamp && new Date(notif.timestamp).toLocaleTimeString()}</span>
                          </div>
                        </div>
                        {!notif.read && (
                          <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'var(--deltek-blue)', flexShrink: 0, marginTop: '6px' }}></div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    function ActivityView({ activity }) {
      if (!activity.length) return <div className="empty-state"><div className="empty-state-icon"><AgentIcon src="assets/brand/icons/gear-integration.svg" size={48} /></div><div className="empty-state-title">No Activity</div><p>Activity will appear as agents work</p></div>;
      return <div className="card">{activity.map((a, i) => <ActivityItem key={i} item={a} />)}</div>;
    }

    function ActivityItem({ item }) {
      const agent = AGENTS.find(a => a.id === item.agent) || { icon: 'assets/brand/icons/data-workflow.svg', color: '#607d8b' };
      const actionColors = { start: '#0066cc', complete: '#00875a', block: '#d32f2f' };
      const color = actionColors[item.action] || agent.color;
      const bgColors = { '#0066cc': '#e6f0fa', '#00875a': '#e6f4ef', '#d32f2f': '#fdeaea' };
      const bg = bgColors[color] || '#f5f7fa';
      return (
        <div className="activity-item">
          <div className="activity-icon" style={{ background: bg, color }}><AgentIcon src={agent.icon} size={18} /></div>
          <div className="activity-content">
            <div className="activity-text"><strong>{agent.name || item.agent}</strong> {item.action}{item.project_id && <span className="text-muted"> on {item.project_id}</span>}</div>
            <div className="activity-time">{item.timestamp && new Date(item.timestamp).toLocaleString()}</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
