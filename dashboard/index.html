                    <button onClick={() => setStep('choose')} style={{ background: 'none', border: 'none', color: 'var(--deltek-blue)', cursor: 'pointer', fontSize: '13px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                      ← Back
                    </button>

                    <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                      <div style={{ width: '56px', height: '56px', borderRadius: '50%', background: 'var(--deltek-blue)15', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
                        <AgentIcon src="assets/brand/icons/ai-chip.svg" size={28} />
                      </div>
                      <div style={{ fontSize: '18px', fontWeight: 600, color: 'var(--text-primary)' }}>What do you want to build?</div>
                    </div>

                    <textarea
                      className="form-textarea"
                      style={{ minHeight: '120px', fontSize: '15px' }}
                      placeholder="Describe what you want to build...&#10;&#10;Examples:&#10;• Add user authentication with OAuth&#10;• Fix the checkout page bug&#10;• Build a REST API for products"
                      value={description}
                      onChange={e => setDescription(e.target.value)}
                      autoFocus
                    />

                    <div style={{ marginTop: '12px', padding: '12px', background: 'var(--bg-tertiary)', borderRadius: '8px', fontSize: '12px', color: 'var(--text-muted)' }}>
                      <strong>What happens next:</strong> 7 AI agents will work together - gathering requirements, designing architecture, writing code, testing, and deploying.
                    </div>

                    <div className="modal-footer" style={{ marginTop: '24px', padding: 0, border: 'none' }}>
                      <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                      <button className="btn-run-sdlc" disabled={!description.trim()} onClick={handleSubmit}>
                        Start Building →
                      </button>
                    </div>
                  </div>
                )}

                {/* STEP 2b: Ask an Agent */}
                {step === 'agent' && (
                  <div>
                    <button onClick={() => { setStep('choose'); setSelectedAgent(null); }} style={{ background: 'none', border: 'none', color: 'var(--deltek-blue)', cursor: 'pointer', fontSize: '13px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                      ← Back
                    </button>

                    {!selectedAgent ? (
                      <>
                        <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                          <div style={{ fontSize: '18px', fontWeight: 600, color: 'var(--text-primary)' }}>Choose an Agent</div>
                          <div style={{ fontSize: '13px', color: 'var(--text-muted)' }}>Each agent has a specialized skill</div>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '10px' }}>
                          {agents.map(agent => (
                            <div
                              key={agent.id}
                              onClick={() => setSelectedAgent(agent)}
                              style={{
                                padding: '16px',
                                border: '1px solid var(--border-color)',
                                borderRadius: '10px',
                                cursor: 'pointer',
                                transition: 'all 0.2s',
                                background: 'var(--bg-secondary)',
                                textAlign: 'center'
                              }}
                              onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--deltek-blue)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
                              onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border-color)'; e.currentTarget.style.transform = 'none'; }}
                            >
                              <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: 'var(--bg-tertiary)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px' }}>
                                <AgentIcon src={agent.icon} size={20} />
                              </div>
                              <div style={{ fontSize: '14px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '4px' }}>{agent.name}</div>
                              <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{agent.purpose}</div>
                            </div>
                          ))}
                        </div>
                      </>
                    ) : (
                      <>
                        <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                          <div style={{ width: '56px', height: '56px', borderRadius: '50%', background: 'var(--dela-purple)15', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
                            <AgentIcon src={selectedAgent.icon} size={28} />
                          </div>
                          <div style={{ fontSize: '18px', fontWeight: 600, color: 'var(--text-primary)' }}>{selectedAgent.name}</div>
                          <div style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{selectedAgent.purpose}</div>
                        </div>

                        {selectedAgent.placeholder && (
                          <textarea
                            className="form-textarea"
                            style={{ minHeight: '100px' }}
                            placeholder={selectedAgent.placeholder}
                            value={agentPrompt}
                            onChange={e => setAgentPrompt(e.target.value)}
                            autoFocus
                          />
                        )}

                        <div className="modal-footer" style={{ marginTop: '24px', padding: 0, border: 'none' }}>
                          <button type="button" className="btn btn-secondary" onClick={() => setSelectedAgent(null)}>Choose Different</button>
                          <button className="btn-run-sdlc" onClick={handleSubmit}>
                            Run {selectedAgent.name} →
                          </button>
                        </div>
                      </>
                    )}
                  </div>
                )}

                {/* STEP 2c: Continue Project */}
                {step === 'project' && (
                  <div>
                    <button onClick={() => setStep('choose')} style={{ background: 'none', border: 'none', color: 'var(--deltek-blue)', cursor: 'pointer', fontSize: '13px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                      ← Back
                    </button>

                    <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                      <div style={{ fontSize: '18px', fontWeight: 600, color: 'var(--text-primary)' }}>Select a Project</div>
                      <div style={{ fontSize: '13px', color: 'var(--text-muted)' }}>Choose a project to continue working on</div>
                    </div>

                    {projects.length === 0 ? (
                      <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>
                        <div style={{ fontSize: '14px', marginBottom: '8px' }}>No projects yet</div>
                        <button className="btn btn-secondary" onClick={() => setStep('build')}>Create your first project</button>
                      </div>
                    ) : (
                      <div className="project-list" style={{ maxHeight: '300px' }}>
                        {projects.map(p => (
                          <div
                            key={p.id}
                            className={`project-item ${selectedProject?.id === p.id ? 'selected' : ''}`}
                            onClick={() => setSelectedProject(p)}
                          >
                            <div className="project-item-header">
                              <span className="project-item-id">{p.id}</span>
                              <span className={`project-item-status ${p.status}`}>{p.status.replace('_', ' ')}</span>
                            </div>
                            <div className="project-item-name">{p.name || p.description?.slice(0, 60) || 'Unnamed project'}</div>
                          </div>
                        ))}
                      </div>
                    )}

                    {selectedProject && (
                      <div className="modal-footer" style={{ marginTop: '24px', padding: 0, border: 'none' }}>
                        <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                        <button className="btn-run-sdlc" onClick={handleSubmit}>
                          Continue Project →
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // Settings Component with Budget & Notifications
    function Settings({ totalCost }) {
      const [budget, setBudget] = useState(() => parseFloat(localStorage.getItem('sdlc-budget') || '10'));
      const [budgetAlert, setBudgetAlert] = useState(() => parseFloat(localStorage.getItem('sdlc-budget-alert') || '80'));
      const [slackWebhook, setSlackWebhook] = useState(() => localStorage.getItem('sdlc-slack-webhook') || '');
      const [teamsWebhook, setTeamsWebhook] = useState(() => localStorage.getItem('sdlc-teams-webhook') || '');
      const [emailEnabled, setEmailEnabled] = useState(() => localStorage.getItem('sdlc-email-enabled') === 'true');
      const [notifyOnComplete, setNotifyOnComplete] = useState(() => localStorage.getItem('sdlc-notify-complete') !== 'false');
      const [notifyOnBlocked, setNotifyOnBlocked] = useState(() => localStorage.getItem('sdlc-notify-blocked') !== 'false');
      const [notifyOnBudget, setNotifyOnBudget] = useState(() => localStorage.getItem('sdlc-notify-budget') !== 'false');

      const saveBudget = () => {
        localStorage.setItem('sdlc-budget', budget.toString());
        localStorage.setItem('sdlc-budget-alert', budgetAlert.toString());
        alert('Budget settings saved!');
      };

      const saveNotifications = () => {
        localStorage.setItem('sdlc-slack-webhook', slackWebhook);
        localStorage.setItem('sdlc-teams-webhook', teamsWebhook);
        localStorage.setItem('sdlc-email-enabled', emailEnabled.toString());
        localStorage.setItem('sdlc-notify-complete', notifyOnComplete.toString());
        localStorage.setItem('sdlc-notify-blocked', notifyOnBlocked.toString());
        localStorage.setItem('sdlc-notify-budget', notifyOnBudget.toString());
        alert('Notification settings saved!');
      };

      const budgetUsed = (totalCost / budget) * 100;
      const budgetStatus = budgetUsed >= 100 ? 'danger' : budgetUsed >= budgetAlert ? 'warning' : 'safe';

      return (
        <div className="settings-view">
          {/* Budget Settings */}
          <div className="settings-section">
            <div className="settings-section-title">
              <AgentIcon src="assets/brand/icons/calculator.svg" size={20} />
              Cost Budget
            </div>

            <div className="form-group">
              <label className="form-label">Monthly Budget (USD)</label>
              <input
                type="number"
                className="form-input"
                value={budget}
                onChange={e => setBudget(parseFloat(e.target.value) || 0)}
                min="1"
                step="1"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Alert Threshold (%)</label>
              <input
                type="number"
                className="form-input"
                value={budgetAlert}
                onChange={e => setBudgetAlert(parseFloat(e.target.value) || 80)}
                min="50"

    // Export Report Button Component
    function ExportButton({ projects, costs }) {
      const [showMenu, setShowMenu] = useState(false);

      const exportCSV = () => {
        const headers = ['Project ID', 'Name', 'Status', 'Created', 'Phases', 'Cost'];
        const rows = projects.map(p => [
          p.id,
          p.name || '',
          p.status,
          p.createdAt,
          (p.phases || []).length,
          p.cost?.total_cost || 0
        ]);
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sdlc-report-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        setShowMenu(false);
      };

      const exportJSON = () => {
        const data = { projects, costs, exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sdlc-report-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        setShowMenu(false);
      };

      return (
        <div style={{ position: 'relative' }}>
          <button className="btn-export" onClick={() => setShowMenu(!showMenu)}>
            <AgentIcon src="assets/brand/icons/data-flow.svg" size={14} />
            Export
          </button>
          {showMenu && (
            <div style={{
              position: 'absolute',
              top: '100%',
              right: 0,
              marginTop: '4px',
              background: 'var(--bg-card)',
              border: '1px solid var(--border-color)',
              borderRadius: 'var(--radius-md)',
              boxShadow: 'var(--shadow-lg)',
              zIndex: 100,
              minWidth: '140px'
            }}>
              <div style={{ padding: '8px 12px', cursor: 'pointer', fontSize: '13px', borderBottom: '1px solid var(--border-light)' }} onClick={exportCSV}>
                Export as CSV
              </div>
              <div style={{ padding: '8px 12px', cursor: 'pointer', fontSize: '13px' }} onClick={exportJSON}>
                Export as JSON
              </div>
            </div>
          )}
        </div>
      );
    }

    // 2. Command Palette
    function CommandPalette({ show, onClose, onAction, projects }) {
      const [query, setQuery] = useState('');
      const [selectedIndex, setSelectedIndex] = useState(0);
      const inputRef = useRef(null);

      const commands = [
        { id: 'new-project', title: 'New Project', desc: 'Start a new SDLC project', icon: '➕', group: 'Actions', action: () => onAction('new-project') },
        { id: 'run-sdlc', title: 'Run SDLC', desc: 'Open SDLC runner', icon: '▶️', group: 'Actions', shortcut: '⌘K', action: () => onAction('run-sdlc') },
        { id: 'export-csv', title: 'Export CSV', desc: 'Download projects as CSV', icon: '📊', group: 'Actions', action: () => onAction('export-csv') },
        { id: 'export-pdf', title: 'Export PDF Report', desc: 'Generate executive summary', icon: '📄', group: 'Actions', action: () => onAction('export-pdf') },
        { id: 'toggle-theme', title: 'Toggle Theme', desc: 'Switch dark/light mode', icon: '🌙', group: 'Settings', action: () => onAction('toggle-theme') },
        { id: 'view-executive', title: 'Executive Dashboard', desc: 'Go to executive view', icon: '📈', group: 'Navigation', action: () => onAction('view-executive') },
        { id: 'view-projects', title: 'Projects', desc: 'View all projects', icon: '📁', group: 'Navigation', action: () => onAction('view-projects') },
        { id: 'view-analytics', title: 'Analytics', desc: 'Cost and performance analytics', icon: '📊', group: 'Navigation', action: () => onAction('view-analytics') },
        { id: 'view-timeline', title: 'Timeline', desc: 'Gantt timeline view', icon: '📅', group: 'Navigation', action: () => onAction('view-timeline') },
        { id: 'view-compare', title: 'Compare Projects', desc: 'Side-by-side comparison', icon: '⚖️', group: 'Navigation', action: () => onAction('view-compare') },
        { id: 'view-integrations', title: 'Integrations', desc: 'Manage connections', icon: '🔗', group: 'Navigation', action: () => onAction('view-integrations') },
      ];

      // Add project search results
      const projectCommands = projects.slice(0, 5).map(p => ({
        id: `project-${p.id}`,
        title: p.name || p.description || p.id,
        desc: `View project details`,
        icon: '📋',
        group: 'Projects',
        action: () => onAction('open-project', p)
      }));

      const allCommands = [...commands, ...projectCommands];
      const filteredCommands = query
        ? allCommands.filter(c => c.title.toLowerCase().includes(query.toLowerCase()) || c.desc.toLowerCase().includes(query.toLowerCase()))
        : allCommands;

      const groupedCommands = filteredCommands.reduce((acc, cmd) => {
        if (!acc[cmd.group]) acc[cmd.group] = [];
        acc[cmd.group].push(cmd);
        return acc;
      }, {});

      useEffect(() => {
        if (show && inputRef.current) {
          inputRef.current.focus();
        }
        setQuery('');
        setSelectedIndex(0);
      }, [show]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!show) return;
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setSelectedIndex(i => Math.min(i + 1, filteredCommands.length - 1));
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setSelectedIndex(i => Math.max(i - 1, 0));
          } else if (e.key === 'Enter' && filteredCommands[selectedIndex]) {
            e.preventDefault();
            filteredCommands[selectedIndex].action();
            onClose();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [show, selectedIndex, filteredCommands, onClose]);

      if (!show) return null;

      let flatIndex = 0;
      return (
        <div className="command-palette-overlay" onClick={onClose}>
          <div className="command-palette" onClick={e => e.stopPropagation()}>
            <div className="command-input-wrapper">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--text-muted)" strokeWidth="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              <input
                ref={inputRef}
                className="command-input"
                placeholder="Type a command or search..."
                value={query}
                onChange={e => { setQuery(e.target.value); setSelectedIndex(0); }}
              />
              <kbd>ESC</kbd>
            </div>
            <div className="command-list">
              {Object.entries(groupedCommands).map(([group, cmds]) => (
                <div key={group} className="command-group">
                  <div className="command-group-title">{group}</div>
                  {cmds.map(cmd => {
                    const index = flatIndex++;
                    return (
                      <div
                        key={cmd.id}
                        className={`command-item ${selectedIndex === index ? 'selected' : ''}`}
                        onClick={() => { cmd.action(); onClose(); }}
                        onMouseEnter={() => setSelectedIndex(index)}
                      >
                        <div className="command-item-icon">{cmd.icon}</div>
                        <div className="command-item-content">
                          <div className="command-item-title">{cmd.title}</div>
                          <div className="command-item-desc">{cmd.desc}</div>
                        </div>
                        {cmd.shortcut && <div className="command-item-shortcut"><kbd>{cmd.shortcut}</kbd></div>}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // 5. Gantt Timeline View
    function GanttTimeline({ projects }) {
      const days = [];
      const today = new Date();
      for (let i = -7; i <= 14; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
      }

      const getBarPosition = (project) => {
        const created = new Date(project.createdAt || project.created_at || today);
        const completed = project.completedAt || project.completed_at;
        const end = completed ? new Date(completed) : new Date();

        const startOffset = Math.max(0, Math.floor((created - days[0]) / (1000 * 60 * 60 * 24)));
        const duration = Math.max(1, Math.ceil((end - created) / (1000 * 60 * 60 * 24)));

        return {
          left: `${(startOffset / days.length) * 100}%`,
          width: `${Math.min(duration / days.length * 100, 100 - (startOffset / days.length) * 100)}%`
        };
      };

      return (
        <div className="card">
          <div className="section-header">
            <h3 className="section-title">Project Timeline</h3>
          </div>
          <div className="gantt-container">
            <div className="gantt-header">
              <div className="gantt-label-col">Project</div>
              <div className="gantt-timeline-col">
                {days.map((d, i) => (
                  <div key={i} className={`gantt-day ${d.toDateString() === today.toDateString() ? 'today' : ''}`}>
                    {d.getDate()}/{d.getMonth() + 1}
                  </div>
                ))}
              </div>
            </div>
            {projects.slice(0, 10).map(p => {
              const pos = getBarPosition(p);
              const status = normalizeStatus(p.status);
              return (
                <div key={p.id} className="gantt-row">
                  <div className="gantt-project-label">{p.name || p.description || p.id}</div>
                  <div className="gantt-bars">
                    <div
                      className={`gantt-bar ${status === 'completed' || status === 'complete' ? 'completed' : status === 'blocked' ? 'blocked' : 'active'}`}
                      style={pos}
                    >
                      {p.name || p.id}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

      const agentCost = costs.reduce((sum, c) => {
        const breakdown = (c.breakdown_by_agent || []).find(b => b.agent === agentId);
        return sum + (breakdown?.cost || 0);
      }, 0);
      const invocations = costs.reduce((sum, c) => {
        const breakdown = (c.breakdown_by_agent || []).find(b => b.agent === agentId);
        return sum + (breakdown?.invocations || 0);
      }, 0);
      const tokens = costs.reduce((sum, c) => {
        const breakdown = (c.breakdown_by_agent || []).find(b => b.agent === agentId);
        return sum + (breakdown?.tokens || 0);
      }, 0);

    // 11. Predictive Analytics
    function PredictiveAnalytics({ projects }) {
      const activeProjects = projects.filter(p => isActive(p));

      const predictions = activeProjects.map(project => {
        const phases = project.phases || [];
        const completed = phases.filter(p => p.status === 'complete' || p.status === 'completed').length;
        const total = PIPELINE_AGENTS.length;
        const progress = completed / total;

        // Simple prediction: estimate days remaining based on average phase time
        const created = new Date(project.createdAt || project.created_at);
        const daysSoFar = Math.max(1, (Date.now() - created.getTime()) / (1000 * 60 * 60 * 24));
        const daysPerPhase = daysSoFar / Math.max(1, completed);
        const remainingPhases = total - completed;
        const estimatedDaysRemaining = Math.ceil(daysPerPhase * remainingPhases);

        const estimatedCompletion = new Date();
        estimatedCompletion.setDate(estimatedCompletion.getDate() + estimatedDaysRemaining);

        const confidence = Math.min(95, Math.max(40, Math.round(progress * 100 + 20)));

        return { project, estimatedCompletion, confidence, remainingPhases };
      });

      if (predictions.length === 0) {
        return (
          <div className="card">
            <div className="section-header"><h3 className="section-title">Predictive Analytics</h3></div>
            <div className="empty-state">
              <div className="empty-state-title">No active projects</div>
              <p>Start a project to see completion predictions</p>
            </div>
          </div>
        );
      }

      return (
        <div className="card">
          <div className="section-header"><h3 className="section-title">Completion Predictions</h3></div>
          <div className="grid-2" style={{ padding: '16px', gap: '16px' }}>
            {predictions.slice(0, 4).map(({ project, estimatedCompletion, confidence, remainingPhases }) => (
              <div key={project.id} className="prediction-card">
                <div className="prediction-header">
                  <div className="prediction-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2">
                      <circle cx="12" cy="12" r="10"/>
                      <polyline points="12 6 12 12 16 14"/>
                    </svg>
                  </div>
                  <div>
                    <div className="prediction-date">{estimatedCompletion.toLocaleDateString()}</div>
                    <div className="prediction-label">Estimated completion</div>
                  </div>
                </div>
                <div style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '8px' }}>
                  {project.name || project.description || project.id}
                </div>
                <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px' }}>
                  {remainingPhases} phase(s) remaining
                </div>
                <div className="prediction-confidence">
                  <span>Confidence</span>
                  <div className="confidence-bar">
                    <div className="confidence-fill" style={{ width: `${confidence}%` }}></div>
                  </div>
                  <span>{confidence}%</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [activeView, setActiveView] = useState('executive');

      const [lastUpdate, setLastUpdate] = useState(new Date());
      const [notifications, setNotifications] = useState([]);
      const [showNotifications, setShowNotifications] = useState(false);
      const [unreadCount, setUnreadCount] = useState(0);
      const [showRunModal, setShowRunModal] = useState(false);
      const [sdlcRunning, setSdlcRunning] = useState(false);
      const [sdlcStatus, setSdlcStatus] = useState(null);
      const [theme, setTheme] = useState(() => localStorage.getItem('sdlc-theme') || 'light');
      const lastActivityRef = useRef(null);

      // New feature states
      const [showCommandPalette, setShowCommandPalette] = useState(false);
      const [selectedProject, setSelectedProject] = useState(null);
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [toasts, setToasts] = useState([]);

      // Theme effect - apply and persist
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('sdlc-theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

      // Add toast notification
      const addToast = (title, message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
      };

      // Dismiss toast
      const dismissToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      // Budget alert check
      useEffect(() => {
        const budget = parseFloat(localStorage.getItem('sdlc-budget') || '10');
        const alertThreshold = parseFloat(localStorage.getItem('sdlc-budget-alert') || '80');
        const totalCost = costs.reduce((s, c) => s + (c.total_cost || 0), 0);
        const usedPercent = (totalCost / budget) * 100;

        if (usedPercent >= 100) {
          addToast('Budget Exceeded', `You've exceeded your $${budget} budget!`, 'danger');
        } else if (usedPercent >= alertThreshold) {
          addToast('Budget Warning', `You've used ${usedPercent.toFixed(0)}% of your budget`, 'warning');
        }
      }, [costs]);

      // Keyboard shortcuts
      useEffect(() => {
        const handleKeyDown = (e) => {
          // ⌘K / Ctrl+K - Open Command Palette
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            setShowCommandPalette(true);
          }
          // Escape - Close modals
          if (e.key === 'Escape') {
            if (showCommandPalette) setShowCommandPalette(false);
            else if (showRunModal) setShowRunModal(false);
            else if (selectedProject) setSelectedProject(null);
            else if (selectedAgent) setSelectedAgent(null);
          }
        };

        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [showRunModal, showCommandPalette, selectedProject, selectedAgent]);

      // Command palette action handler
      const handleCommandAction = (action, data) => {
        switch (action) {
          case 'new-project':
          case 'run-sdlc':
            setShowRunModal(true);
            break;
          case 'toggle-theme':
            toggleTheme();
            break;
          case 'view-executive':
            setActiveView('executive');
            break;
          case 'view-projects':
            setActiveView('projects');
            break;
          case 'view-analytics':
            setActiveView('analytics');
            break;
          case 'view-timeline':
            setActiveView('timeline');
            break;
          case 'view-compare':
            setActiveView('compare');
            break;
          case 'view-integrations':
            setActiveView('integrations');
            break;
          case 'export-csv':
            // Trigger CSV export
            const csvData = projects.map(p => [p.id, p.name || '', p.status, p.createdAt].join(','));
            const blob = new Blob(['ID,Name,Status,Created\n' + csvData.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sdlc-projects.csv';
            a.click();
            addToast('Export Complete', 'CSV file downloaded', 'success');
            break;
          case 'export-pdf':
            window.print();
            break;
          case 'open-project':
            setSelectedProject(data);
            break;
        }
      };

      // Check for new activity and create notifications
      const checkForNewActivity = useCallback((newActivity, oldActivity) => {
        if (!oldActivity || oldActivity.length === 0) return;

        const lastKnownTimestamp = oldActivity[0]?.timestamp;
        const newItems = newActivity.filter(a =>
          a.timestamp && lastKnownTimestamp && a.timestamp > lastKnownTimestamp
        );

        if (newItems.length > 0) {
          const newNotifs = newItems.map(item => ({
            id: `${item.timestamp}-${item.agent}-${item.project}`,
            timestamp: item.timestamp,
            agent: item.agent,
            project: item.project,
            action: item.action,
            type: item.type,
            read: false
          }));

          setNotifications(prev => [...newNotifs, ...prev].slice(0, 50));
          setUnreadCount(prev => prev + newItems.length);

          // Show browser notification if supported
          if (Notification.permission === 'granted') {
            newItems.forEach(item => {
              const agent = AGENTS.find(a => a.id === item.agent);
              new Notification(`AI-SDLC: ${agent?.name || item.agent}`, {
                body: `${item.action} on ${item.project}`,
                icon: '⚡',
                tag: item.timestamp
              });
            });
          }
        }
      }, []);

      const fetchData = async () => {
        try {
          const [p, a, c] = await Promise.all([
            fetch('/api/projects').then(r => r.json()).catch(() => []),
            fetch('/api/activity?limit=50').then(r => r.json()).catch(() => []),
            fetch('/api/costs').then(r => r.json()).catch(() => [])
          ]);

          // Check for new activity before updating state
          if (lastActivityRef.current) {
            checkForNewActivity(a, lastActivityRef.current);
          }
          lastActivityRef.current = a;

          setProjects(p);
          setActivity(a);
          setCosts(c);
          setStats({
            totalProjects: p.length,
            completedProjects: p.filter(isCompleted).length,
            activeProjects: p.filter(isActive).length,
            blockedProjects: p.filter(x => x.status === 'blocked').length
          });
          setLastUpdate(new Date());
        } catch (e) { console.error(e); }
      };

      // Request notification permission on mount
      useEffect(() => {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, []);

      // Real-time updates via SSE
      useEffect(() => {
        fetchData(); // Initial fetch

        // Connect to SSE for real-time updates
        let eventSource = null;
        let reconnectTimer = null;

        const connect = () => {
          eventSource = new EventSource('/api/events');

          eventSource.addEventListener('init', (e) => {
            try {
              const data = JSON.parse(e.data);
              setProjects(data.projects || []);
              setActivity(data.activity || []);
              setCosts(data.costs || []);
              const p = data.projects || [];
              setStats({
                totalProjects: p.length,
                completedProjects: p.filter(isCompleted).length,
                activeProjects: p.filter(isActive).length,
                blockedProjects: p.filter(x => x.status === 'blocked').length
              });
              setLastUpdate(new Date());
              console.log('SSE: Connected');
            } catch (err) { console.error('SSE init error:', err); }
          });

          eventSource.addEventListener('update', (e) => {
            try {
              const data = JSON.parse(e.data);
              if (data.projects) {
                setProjects(data.projects);
                const p = data.projects;
                setStats({
                  totalProjects: p.length,
                  completedProjects: p.filter(isCompleted).length,
                  activeProjects: p.filter(isActive).length,
                  blockedProjects: p.filter(x => x.status === 'blocked').length
                });
              }
              if (data.activity) {
                if (lastActivityRef.current) {
                  checkForNewActivity(data.activity, lastActivityRef.current);
                }
                lastActivityRef.current = data.activity;
                setActivity(data.activity);
              }
              setLastUpdate(new Date());
            } catch (err) { console.error('SSE update error:', err); }
          });

          eventSource.onerror = () => {
            console.log('SSE: Connection lost, reconnecting...');
            eventSource.close();
            reconnectTimer = setTimeout(connect, 3000);
          };
        };

        connect();

        // Fallback polling - reduced from 30s to 10s for better reliability
        const fallbackInterval = setInterval(fetchData, 10000);

        return () => {
          if (eventSource) eventSource.close();
          if (reconnectTimer) clearTimeout(reconnectTimer);
          clearInterval(fallbackInterval);
        };
      }, []);

      const totalCost = costs.reduce((s, c) => s + (c.total_cost || 0), 0);

      // Calculate value metrics
      const valueMetrics = calculateValueMetrics(projects, costs);

      const getHealth = () => {
        if (stats.blockedProjects > 0) return { score: 'C', class: 'warning', title: 'Needs Attention', message: `${stats.blockedProjects} project(s) blocked` };
        if (stats.totalProjects === 0) return { score: 'A', class: 'excellent', title: 'Ready to Start', message: 'Run /sdlc-start to begin' };
        if (stats.completedProjects === stats.totalProjects) return { score: 'A+', class: 'excellent', title: 'All Complete', message: 'All projects completed successfully' };
        return { score: 'A', class: 'excellent', title: 'All Systems Operational', message: `${stats.activeProjects} project(s) in progress` };

            setTimeout(() => {
              setSdlcRunning(false);
              setSdlcStatus(null);
            }, 5000);
          }
        } catch (error) {
          setSdlcStatus(`Error: ${error.message}`);
          setTimeout(() => {
            setSdlcRunning(false);
            setSdlcStatus(null);
          }, 5000);
        }
      };

      return (
        <div className="app-shell">

              <div className="sidebar-logo" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: '8px' }}>

                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>

                  <span style={{ fontSize: '9px', opacity: 0.7, letterSpacing: '1px', background: 'rgba(255,255,255,0.15)', padding: '2px 6px', borderRadius: '4px' }}>CONTROL CENTER</span>
                </div>
              </div>
            </div>
            <nav className="sidebar-nav">
              <div className="nav-section">
                <div className="nav-section-title">Dashboard</div>
                {[
                  { id: 'executive', icon: 'assets/brand/icons/calculator.svg', label: 'Executive' },
                  { id: 'value', icon: 'assets/brand/icons/checkmark-badge.svg', label: 'Value & ROI' },
                  { id: 'projects', icon: 'assets/brand/icons/checklist.svg', label: 'Projects' },
                  { id: 'timeline', icon: 'assets/brand/icons/data-flow.svg', label: 'Timeline', badge: 'New' },
                  { id: 'analytics', icon: 'assets/brand/icons/gear-integration.svg', label: 'Analytics' },

                  { id: 'agents', icon: 'assets/brand/icons/workflow-team.svg', label: 'Agents' },

    function calculateValueMetrics(projects, costs) {
      const completed = projects.filter(isCompleted).length;
      const totalCost = costs.reduce((s, c) => s + (c.total_cost || 0), 0);

      // Estimated traditional cost (industry benchmark)
      const traditionalCost = completed * BENCHMARKS.manualHoursPerFeature * BENCHMARKS.hourlyDevCost;
      const costSavings = traditionalCost - totalCost;
      const costSavingsPercent = traditionalCost > 0 ? (costSavings / traditionalCost) * 100 : 0;

      // Time savings (AI-SDLC averages 4 hours per feature vs 40 manual)
      const aiHoursPerFeature = 4;
      const timeSaved = completed * (BENCHMARKS.manualHoursPerFeature - aiHoursPerFeature);

      // Quality improvements
      const aiDefectRate = 3; // AI-SDLC: 3 defects per 100 features
      const defectsPrevented = completed * (BENCHMARKS.manualDefectRate - aiDefectRate) / 100;

      // Velocity improvement
      const velocityMultiplier = BENCHMARKS.manualHoursPerFeature / aiHoursPerFeature;

      // ROI calculation
      const roi = totalCost > 0 ? (costSavings / totalCost) * 100 : 0;

      return {
        completed,
        totalCost,
        traditionalCost,
        costSavings,
        costSavingsPercent,
        timeSaved,
        defectsPrevented,
        velocityMultiplier,
        roi,
        testCoverage: 92, // AI-SDLC enforces high coverage
        deployTime: 0.5, // 30 minutes vs 4 hours
      };
    }

    function Executive({ stats, health, totalCost, projects, activity, costs, valueMetrics }) {
      const successRate = stats.totalProjects > 0 ? Math.round((stats.completedProjects / stats.totalProjects) * 100) : 100;

      // Calculate pipeline stage counts
      const pipelineData = useMemo(() => {
        const stages = {
          conductor: { count: 0, active: 0, label: 'Conductor', icon: 'assets/brand/icons/workflow-team.svg' },
          ba: { count: 0, active: 0, label: 'Requirements', icon: 'assets/brand/icons/checklist.svg' },
          jets: { count: 0, active: 0, label: 'Architecture', icon: 'assets/brand/icons/gear-integration.svg' },
          engineer: { count: 0, active: 0, label: 'Development', icon: 'assets/brand/icons/data-workflow.svg' },
          security: { count: 0, active: 0, label: 'Security', icon: 'assets/brand/icons/shield-badge.svg' },
          qa: { count: 0, active: 0, label: 'QA Testing', icon: 'assets/brand/icons/checkmark-badge.svg' },
          atlas: { count: 0, active: 0, label: 'Deployment', icon: 'assets/brand/icons/network-activity.svg' },
          customer: { count: 0, active: 0, label: 'UAT', icon: 'assets/brand/icons/user-globe.svg' }
        };

        projects.forEach(p => {
          const phasesMap = normalizePhasesArray(p.phases);
          const currentPhase = p.currentPhase || getCurrentPhaseInfo(p.phases)?.agent;

          Object.keys(stages).forEach(stageId => {
            const status = phasesMap[stageId];
            if (status === 'completed' || status === 'complete') {
              stages[stageId].count++;
            }
            if (currentPhase === stageId || status === 'in_progress' || status === 'active') {
              stages[stageId].active++;
            }
          });
        });

        return stages;
      }, [projects]);

      // Calculate agent performance from costs and activity
      const agentPerformance = useMemo(() => {
        const perf = {};
        AGENTS.forEach(a => {
          perf[a.id] = { invocations: 0, cost: 0, tokens: 0, avgTime: 0, blocked: 0, name: a.name, role: a.role, icon: a.icon };
        });

        costs.forEach(c => {
          (c.breakdown_by_agent || []).forEach(a => {
            if (perf[a.agent]) {
              perf[a.agent].invocations += a.invocations || 0;
              perf[a.agent].cost += a.cost || 0;
              perf[a.agent].tokens += a.tokens || 0;
            }
          });
        });

        // Count blocks from activity
        activity.forEach(a => {
          if (a.type === 'blocked' && perf[a.agent]) {
            perf[a.agent].blocked++;
          }
        });

        return perf;
      }, [costs, activity]);

      // Calculate velocity (projects completed per week over last 4 weeks)
      const velocityData = useMemo(() => {
        const weeks = [];
        const now = new Date();

        for (let i = 3; i >= 0; i--) {
          const weekStart = new Date(now);
          weekStart.setDate(now.getDate() - (i + 1) * 7);
          const weekEnd = new Date(now);
          weekEnd.setDate(now.getDate() - i * 7);

          const completed = projects.filter(p => {
            const completedAt = p.completedAt || p.completed_at;
            if (!completedAt) return false;
            const date = new Date(completedAt);
            return date >= weekStart && date < weekEnd;
          }).length;

          weeks.push({
            label: i === 0 ? 'This Week' : i === 1 ? 'Last Week' : `${i + 1}w ago`,
            completed,
            started: projects.filter(p => {
              const createdAt = p.createdAt || p.created_at;
              if (!createdAt) return false;
              const date = new Date(createdAt);
              return date >= weekStart && date < weekEnd;
            }).length
          });
        }
        return weeks;
      }, [projects]);

      // Calculate bottlenecks - stages where projects are stuck
      const bottlenecks = useMemo(() => {
        const stuck = [];
        projects.forEach(p => {
          if (p.status === 'blocked') {
            const currentPhase = p.currentPhase || getCurrentPhaseInfo(p.phases)?.agent || 'unknown';
            const agent = AGENTS.find(a => a.id === currentPhase);
            stuck.push({
              project: p.id,
              name: p.name || p.description || p.id,
              stage: currentPhase,
              stageName: agent?.name || currentPhase,
              days: Math.floor((Date.now() - new Date(p.updatedAt || p.updated_at || p.createdAt || p.created_at).getTime()) / (1000 * 60 * 60 * 24))
            });
          }
        });
        return stuck.sort((a, b) => b.days - a.days).slice(0, 5);
      }, [projects]);

      // Cost by category
      const costByModel = useMemo(() => {
        const models = { Opus: 0, Sonnet: 0, Haiku: 0 };
        costs.forEach(c => {
          (c.breakdown_by_agent || []).forEach(a => {
            const agent = AGENTS.find(ag => ag.id === a.agent);
            if (agent && models[agent.model] !== undefined) {
              models[agent.model] += a.cost || 0;
            }
          });
        });
        return models;
      }, [costs]);

      // Get max invocations for scaling
      const maxInvocations = Math.max(...Object.values(agentPerformance).map(a => a.invocations), 1);

      return (
        <div>
          {/* Hero Health Banner */}
          <div className="health-indicator" style={{ marginBottom: '24px' }}>
            <div className={`health-score ${health.class}`}>{health.score}</div>
            <div className="health-details">
              <div className="health-title">{health.title}</div>
              <div className="health-message">{health.message}</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              <span className="badge badge-success">{valueMetrics.roi.toFixed(0)}% ROI</span>
              <span className="badge badge-info">{valueMetrics.velocityMultiplier}x Velocity</span>
              <span className="badge" style={{ background: 'var(--bg-tertiary)', color: 'var(--text-secondary)' }}>v2.4</span>
            </div>
          </div>

          {/* Key Metrics Row */}
          <div className="grid-5 mb-xl">
            <div className="metric-card">
              <span className="metric-label">Total Projects</span>
              <span className="metric-value text-blue">{stats.totalProjects}</span>
              <span className="metric-change">{stats.activeProjects} active</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">Completed</span>
              <span className="metric-value text-green">{stats.completedProjects}</span>
              <span className="metric-change positive">{successRate}% success rate</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">Blocked</span>
              <span className="metric-value" style={{ color: stats.blockedProjects > 0 ? '#d32f2f' : 'var(--text-secondary)' }}>{stats.blockedProjects}</span>
              <span className="metric-change">{stats.blockedProjects > 0 ? 'Needs attention' : 'All clear'}</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">AI Investment</span>
              <span className="metric-value text-blue">${totalCost.toFixed(2)}</span>
              <span className="metric-change positive">↓ {valueMetrics.costSavingsPercent.toFixed(0)}% vs manual</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">Time Saved</span>
              <span className="metric-value" style={{ color: '#7b1fa2' }}>{valueMetrics.timeSaved}h</span>
              <span className="metric-change positive">${valueMetrics.costSavings.toFixed(0)} value</span>
            </div>
          </div>

          {/* SDLC Pipeline Flow */}
          <div className="card mb-xl">
            <div className="section-header">
              <h3 className="section-title">SDLC Pipeline Flow</h3>
              <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>End-to-end project progression</span>
            </div>
            <div className="pipeline-flow">
              {Object.entries(pipelineData).map(([id, stage], i) => (
                <React.Fragment key={id}>
                  <div className="pipeline-stage">
                    <div className={`pipeline-stage-icon ${stage.active > 0 ? 'active' : stage.count > 0 ? 'completed' : ''}`}>
                      <AgentIcon src={stage.icon} size={20} />
                      {stage.active > 0 && <span className="stage-pulse"></span>}
                    </div>
                    <div className="pipeline-stage-label">{stage.label}</div>
                    <div className="pipeline-stage-stats">
                      <span className="stage-completed">{stage.count} done</span>
                      {stage.active > 0 && <span className="stage-active">{stage.active} active</span>}
                    </div>
                  </div>
                  {i < Object.keys(pipelineData).length - 1 && (
                    <div className="pipeline-flow-arrow">
                      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--border-color)" strokeWidth="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                      </svg>
                    </div>
                  )}
                </React.Fragment>
              ))}
            </div>
          </div>

          <div className="grid-2 mb-xl">
            {/* Agent Performance Grid */}
            <div className="card">
              <div className="section-header">
                <h3 className="section-title">Agent Performance</h3>
                <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Invocations & cost by agent</span>
              </div>
              <div className="agent-perf-grid">
                {PIPELINE_AGENTS.map(id => {
                  const perf = agentPerformance[id];
                  const agent = AGENTS.find(a => a.id === id);
                  const barWidth = (perf.invocations / maxInvocations) * 100;
                  return (
                    <div key={id} className="agent-perf-row">
                      <div className="agent-perf-info">
                        <AgentIcon src={agent?.icon} size={16} />
                        <span className="agent-perf-name">{perf.role || agent?.role}</span>
                      </div>
                      <div className="agent-perf-bar-container">
                        <div className="agent-perf-bar" style={{ width: `${barWidth}%` }}></div>
                      </div>
                      <div className="agent-perf-stats">
                        <span className="agent-perf-count">{perf.invocations}</span>
                        <span className="agent-perf-cost">${perf.cost.toFixed(2)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Velocity Chart */}
            <div className="card">
              <div className="section-header">
                <h3 className="section-title">Project Velocity</h3>
                <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Weekly throughput</span>
              </div>
              <div className="velocity-chart">
                {velocityData.map((week, i) => {
                  const maxVal = Math.max(...velocityData.map(w => Math.max(w.completed, w.started)), 1);
                  const completedHeight = (week.completed / maxVal) * 100;
                  const startedHeight = (week.started / maxVal) * 100;
                  return (
                    <div key={i} className="velocity-week">
                      <div className="velocity-bars">
                        <div className="velocity-bar completed" style={{ height: `${Math.max(completedHeight, 5)}%` }} title={`${week.completed} completed`}></div>
                        <div className="velocity-bar started" style={{ height: `${Math.max(startedHeight, 5)}%` }} title={`${week.started} started`}></div>
                      </div>
                      <div className="velocity-label">{week.label}</div>
                      <div className="velocity-values">
                        <span className="velocity-completed">{week.completed}</span>
                        <span className="velocity-started">{week.started}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="velocity-legend">
                <span><span className="legend-dot completed"></span> Completed</span>
                <span><span className="legend-dot started"></span> Started</span>
              </div>
            </div>
          </div>

          <div className="grid-3 mb-xl">
            {/* Bottleneck Detection */}
            <div className="card">
              <div className="section-header">
                <h3 className="section-title">Bottleneck Detection</h3>
              </div>
              {bottlenecks.length === 0 ? (
                <div className="bottleneck-clear">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--accent-green)" strokeWidth="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                  </svg>
                  <span>No bottlenecks detected</span>
                  <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>All projects flowing smoothly</span>
                </div>
              ) : (
                <div className="bottleneck-list">
                  {bottlenecks.map((b, i) => (
                    <div key={i} className="bottleneck-item">
                      <div className="bottleneck-project">{b.name.substring(0, 30)}{b.name.length > 30 ? '...' : ''}</div>
                      <div className="bottleneck-details">
                        <span className="badge badge-danger">{b.stageName}</span>
                        <span className="bottleneck-days">{b.days}d stuck</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Cost Distribution */}
            <div className="card">
              <div className="section-header">
                <h3 className="section-title">Cost by Model</h3>
              </div>
              <div className="cost-breakdown">
                {Object.entries(costByModel).map(([model, cost]) => {
                  const total = Object.values(costByModel).reduce((a, b) => a + b, 0) || 1;
                  const percent = (cost / total) * 100;
                  const colors = { Opus: '#7b1fa2', Sonnet: '#0066cc', Haiku: '#00875a' };
                  return (
                    <div key={model} className="cost-model-row">
                      <div className="cost-model-label">
                        <span className="cost-model-dot" style={{ background: colors[model] }}></span>
                        {model}
                      </div>
                      <div className="cost-model-bar-container">
                        <div className="cost-model-bar" style={{ width: `${percent}%`, background: colors[model] }}></div>
                      </div>
                      <div className="cost-model-value">${cost.toFixed(2)}</div>
                    </div>
                  );
                })}
              </div>
              <div className="cost-total">
                <span>Total Spend</span>
                <span className="cost-total-value">${totalCost.toFixed(2)}</span>
              </div>
            </div>

            {/* Recent Activity */}
            <div className="card">
              <div className="section-header">
                <h3 className="section-title">Recent Activity</h3>
              </div>
              <div className="activity-feed">
                {activity.slice(0, 5).map((a, i) => {
                  const agent = AGENTS.find(ag => ag.id === a.agent);
                  const typeColors = { complete: 'var(--accent-green)', blocked: '#d32f2f', start: 'var(--deltek-blue)', progress: 'var(--text-muted)' };
                  return (
                    <div key={i} className="activity-item-mini">
                      <div className="activity-dot" style={{ background: typeColors[a.type] || 'var(--text-muted)' }}></div>
                      <div className="activity-content">
                        <span className="activity-agent">{agent?.role || a.agent}</span>
                        <span className="activity-action">{a.action?.substring(0, 40)}{a.action?.length > 40 ? '...' : ''}</span>
                      </div>
                      <span className="activity-time">{new Date(a.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Quick Actions */}
          <div className="card">
            <div className="section-header">
              <h3 className="section-title">Quick Insights</h3>
            </div>
            <div className="insights-grid">
              <div className="insight-card">
                <div className="insight-icon text-blue">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                  </svg>
                </div>
                <div className="insight-content">
                  <div className="insight-value">{Object.values(agentPerformance).reduce((a, b) => a + b.invocations, 0)}</div>
                  <div className="insight-label">Total Agent Invocations</div>
                </div>
              </div>
              <div className="insight-card">
                <div className="insight-icon text-green">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                    <polyline points="17 6 23 6 23 12"/>
                  </svg>
                </div>
                <div className="insight-content">
                  <div className="insight-value">{velocityData.reduce((a, b) => a + b.completed, 0)}</div>
                  <div className="insight-label">Completed (4 weeks)</div>
                </div>
              </div>
              <div className="insight-card">
                <div className="insight-icon" style={{ color: '#7b1fa2' }}>
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                  </svg>
                </div>
                <div className="insight-content">
                  <div className="insight-value">{valueMetrics.timeSaved}h</div>
                  <div className="insight-label">Developer Time Saved</div>
                </div>
              </div>
              <div className="insight-card">
                <div className="insight-icon text-green">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <polyline points="9 12 11 14 15 10"/>
                  </svg>
                </div>
                <div className="insight-content">
                  <div className="insight-value">{valueMetrics.defectsPrevented.toFixed(0)}</div>
                  <div className="insight-label">Defects Prevented</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ValueROI({ projects, costs, valueMetrics }) {
      const [activeSection, setActiveSection] = useState('summary');
      const roiAngle = Math.min(valueMetrics.roi, 300) * 1.2;

      // Detailed calculations for transparency
      const calculations = {
        traditionalHourlyRate: 85,
        traditionalHoursPerFeature: 40,
        aiHoursPerFeature: 4,
        traditionalDefectRate: 15,
        aiDefectRate: 3,
        defectFixCost: 500, // Average cost to fix a defect
        reworkCostMultiplier: 0.25, // 25% of project cost goes to rework traditionally
      };

      const detailedMetrics = {
        featuresDelivered: valueMetrics.completed,
        // Cost calculations
        traditionalLaborCost: valueMetrics.completed * calculations.traditionalHoursPerFeature * calculations.traditionalHourlyRate,
        aiTokenCost: valueMetrics.totalCost,

    function ComparisonRow({ label, manual, ai, unit, inverse }) {
      const max = Math.max(manual, ai);
      const manualPercent = (manual / max) * 100;
      const aiPercent = (ai / max) * 100;
      const savings = inverse ? ai - manual : manual - ai;
      const savingsPercent = inverse ? ((ai - manual) / manual * 100).toFixed(0) : ((manual - ai) / manual * 100).toFixed(0);

      return (
        <div className="comparison-row">
          <div className="comparison-label">{label}</div>
          <div className="comparison-bars">
            <div className="comparison-bar-row">
              <span className="comparison-bar-label">Manual</span>
              <div className="comparison-bar">
                <div className="comparison-bar-fill" style={{ width: `${manualPercent}%`, background: '#8a9bac' }}>
                  <span className="comparison-bar-value">{manual}{unit}</span>
                </div>
              </div>
            </div>
            <div className="comparison-bar-row">
              <span className="comparison-bar-label">AI-SDLC</span>
              <div className="comparison-bar">
                <div className="comparison-bar-fill" style={{ width: `${aiPercent}%`, background: inverse ? 'var(--accent-green)' : 'var(--deltek-blue)' }}>
                  <span className="comparison-bar-value">{ai}{unit}</span>
                </div>
              </div>
            </div>
          </div>
          <div className="comparison-savings">{inverse ? '+' : ''}{savingsPercent}%</div>
        </div>
      );
    }

    function GoalItem({ title, description, target, current, unit, inverse, metrics }) {

      const achieved = inverse ? current <= target : current >= target;

      return (
        <div className="goal-item">
          <div className="goal-header">
            <div>
              <div className="goal-title">{title}</div>
              <div className="goal-desc">{description}</div>

            <span className={`badge ${achieved ? 'badge-success' : 'badge-warning'}`}>
              {achieved ? 'Achieved' : 'In Progress'}

          </div>
          <div className="progress-bar" style={{ height: '12px' }}>
            <div
              className="progress-fill"
              style={{
                width: `${Math.min(progress, 100)}%`,
                background: achieved ? 'var(--accent-green)' : 'var(--deltek-blue)'
              }}

          </div>
          <div className="goal-metrics">
            {metrics.map((m, i) => (
              <div key={i} className="goal-metric">
                <div className={`goal-metric-value ${m.success ? 'success' : ''}`}>{m.value}</div>
                <div className="goal-metric-label">{m.label}</div>

    function ProjectMini({ project, costs }) {

      const colors = { completed: '#00875a', active: '#0066cc', in_progress: '#0066cc', blocked: '#d32f2f' };
      const color = colors[project.status] || '#ff9800';
      const bgColors = { completed: '#e6f4ef', active: '#e6f0fa', in_progress: '#e6f0fa', blocked: '#fdeaea' };
      const bg = bgColors[project.status] || '#fff4e5';
      return (
        <div className="activity-item">
          <div className="activity-icon" style={{ background: bg, color }}><AgentIcon src="assets/brand/icons/data-workflow.svg" size={14} style={{ filter: 'brightness(0) invert(1)' }} /></div>
          <div className="activity-content">
            <div className="activity-text">{project.description || project.id}</div>
            <div className="activity-time">{project.status}{cost ? ` • $${(cost.total_cost || 0).toFixed(2)}` : ''}</div>
          </div>
