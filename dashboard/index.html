<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-SDLC Control Center</title>
  <style>
    /* ================================================================
       DELTEK HARMONY DESIGN SYSTEM
       Layer 1: Foundation (colors, typography, spacing)
       Layer 2: Components (cards, buttons, badges)
       Layer 3: Layouts (navigation, grids)
       Layer 4: Views (executive, projects, analytics)
       ================================================================ */

    /* === LAYER 1: FOUNDATION === */
    :root {
      /* Color Palette - Professional & Calm */
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --bg-card: #1a2332;
      --bg-hover: #243044;

      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;

      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;

      --border-color: #374151;
      --border-light: #1f2937;

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;

      /* Spacing Scale */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Border Radius */
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* === LAYER 2: COMPONENTS === */

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }

    /* Metric Cards */
    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }

    .metric-change {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
    .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); }
    .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
    .badge-info { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .badge-purple { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }

    /* Progress Bar */
    .progress-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* === LAYER 3: LAYOUT === */

    /* App Shell */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar Navigation */
    .sidebar {
      width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-header {
      padding: var(--space-lg);
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 18px;
      font-weight: 700;
    }

    .sidebar-logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .sidebar-nav {
      flex: 1;
      padding: var(--space-md);
    }

    .nav-section {
      margin-bottom: var(--space-lg);
    }

    .nav-section-title {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: var(--space-sm) var(--space-md);
      margin-bottom: var(--space-xs);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
    }

    .nav-item-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .sidebar-footer {
      padding: var(--space-md);
      border-top: 1px solid var(--border-color);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 220px;
      min-height: 100vh;
    }

    /* Top Bar */
    .top-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: var(--space-md) var(--space-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
    }

    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    /* Content Area */
    .content-area {
      padding: var(--space-xl);
      max-width: 1400px;
    }

    /* Grid Layouts */
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-lg);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-lg);
    }

    /* Section Headers */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .section-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* === LAYER 4: VIEW-SPECIFIC STYLES === */

    /* Health Indicator */
    .health-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      padding: var(--space-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-xl);
    }

    .health-score {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .health-score.excellent { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); border: 3px solid var(--accent-green); }
    .health-score.good { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); border: 3px solid var(--accent-blue); }
    .health-score.warning { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); border: 3px solid var(--accent-yellow); }
    .health-score.critical { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); border: 3px solid var(--accent-red); }

    .health-details {
      flex: 1;
    }

    .health-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .health-message {
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* Project Cards */
    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.2s ease;
      margin-bottom: var(--space-lg);
    }

    .project-card:hover {
      border-color: var(--accent-blue);
    }

    .project-header {
      padding: var(--space-lg);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .project-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .project-id {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .project-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--space-xs);
    }

    .project-cost {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-cyan);
    }

    /* Agent Pipeline */
    .agent-pipeline {
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
    }

    .pipeline-agent {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 56px;
    }

    .pipeline-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .pipeline-icon.completed { background: rgba(16, 185, 129, 0.2); border: 2px solid var(--accent-green); }
    .pipeline-icon.active { background: rgba(59, 130, 246, 0.2); border: 2px solid var(--accent-blue); animation: pulse 1.5s infinite; }
    .pipeline-icon.pending { background: var(--bg-secondary); border: 2px solid var(--border-color); opacity: 0.5; }
    .pipeline-icon.blocked { background: rgba(239, 68, 68, 0.2); border: 2px solid var(--accent-red); }

    .pipeline-name {
      font-size: 9px;
      color: var(--text-secondary);
      text-align: center;
    }

    .pipeline-connector {
      width: 16px;
      height: 2px;
      background: var(--border-color);
      flex-shrink: 0;
    }

    .pipeline-connector.completed { background: var(--accent-green); }

    .project-footer {
      padding: var(--space-md) var(--space-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-progress {
      flex: 1;
      margin-right: var(--space-lg);
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
      display: flex;
      justify-content: space-between;
    }

    .project-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Agent Cards */
    .agent-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      transition: all 0.2s ease;
    }

    .agent-card:hover {
      border-color: var(--accent-blue);
    }

    .agent-avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .agent-info {
      flex: 1;
    }

    .agent-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .agent-role {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .agent-stats {
      text-align: right;
    }

    .agent-invocations {
      font-size: 18px;
      font-weight: 600;
    }

    .agent-cost {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Activity Feed */
    .activity-item {
      display: flex;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border-light);
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .activity-content {
      flex: 1;
    }

    .activity-text {
      font-size: 14px;
      margin-bottom: 2px;
    }

    .activity-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: var(--space-md);
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }

    /* Charts */
    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }

    .chart-header {
      margin-bottom: var(--space-lg);
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Utilities */
    .mb-xl { margin-bottom: var(--space-xl); }
    .mb-lg { margin-bottom: var(--space-lg); }
    .text-green { color: var(--accent-green); }
    .text-yellow { color: var(--accent-yellow); }
    .text-red { color: var(--accent-red); }
    .text-blue { color: var(--accent-blue); }
    .text-purple { color: var(--accent-purple); }
    .text-muted { color: var(--text-muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Agent Definitions
    const AGENTS = [
      { id: 'conductor', name: 'Conductor', icon: '🎭', color: '#6366f1', model: 'Opus', role: 'Orchestrator' },
      { id: 'ba', name: 'BA Agent', icon: '📋', color: '#3b82f6', model: 'Sonnet', role: 'Requirements' },
      { id: 'jets', name: 'Jets', icon: '🏗️', color: '#8b5cf6', model: 'Opus', role: 'Architecture' },
      { id: 'engineer', name: 'Engineer', icon: '💻', color: '#06b6d4', model: 'Sonnet', role: 'Development' },
      { id: 'security', name: 'Security', icon: '🔒', color: '#ef4444', model: 'Sonnet', role: 'Security' },
      { id: 'qa', name: 'QA Agent', icon: '🧪', color: '#f59e0b', model: 'Sonnet', role: 'Testing' },
      { id: 'atlas', name: 'Atlas', icon: '🚀', color: '#8b5cf6', model: 'Sonnet', role: 'Deploy' },
      { id: 'customer', name: 'Customer', icon: '✅', color: '#10b981', model: 'Sonnet', role: 'UAT' },
      { id: 'ask-tom', name: 'Ask Tom', icon: '⚡', color: '#c084fc', model: 'Opus', role: 'Problem Solver' },
      { id: 'finops', name: 'FinOps', icon: '💰', color: '#fbbf24', model: 'Haiku', role: 'Costs' },
      { id: 'tracker', name: 'Tracker', icon: '📊', color: '#64748b', model: 'Haiku', role: 'Monitor' },
    ];

    const PIPELINE_AGENTS = ['ba', 'jets', 'engineer', 'security', 'qa', 'atlas', 'customer'];

    // Main App
    function App() {
      const [activeView, setActiveView] = useState('executive');
      const [projects, setProjects] = useState([]);
      const [activity, setActivity] = useState([]);
      const [costs, setCosts] = useState([]);
      const [stats, setStats] = useState({ totalProjects: 0, completedProjects: 0, activeProjects: 0, blockedProjects: 0 });
      const [lastUpdate, setLastUpdate] = useState(new Date());

      const fetchData = async () => {
        try {
          const [p, a, c] = await Promise.all([
            fetch('/api/projects').then(r => r.json()).catch(() => []),
            fetch('/api/activity?limit=20').then(r => r.json()).catch(() => []),
            fetch('/api/costs').then(r => r.json()).catch(() => [])
          ]);
          setProjects(p);
          setActivity(a);
          setCosts(c);
          setStats({
            totalProjects: p.length,
            completedProjects: p.filter(x => x.status === 'completed').length,
            activeProjects: p.filter(x => x.status === 'active' || x.status === 'in_progress').length,
            blockedProjects: p.filter(x => x.status === 'blocked').length
          });
          setLastUpdate(new Date());
        } catch (e) { console.error(e); }
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 5000);
        return () => clearInterval(interval);
      }, []);

      const totalCost = costs.reduce((s, c) => s + (c.total_cost || 0), 0);
      const totalBudget = costs.reduce((s, c) => s + (c.budget || 0), 0);

      const getHealth = () => {
        if (stats.blockedProjects > 0) return { score: 'C', class: 'warning', title: 'Needs Attention', message: `${stats.blockedProjects} blocked` };
        if (stats.totalProjects === 0) return { score: 'A', class: 'excellent', title: 'Ready', message: 'Start with /sdlc-start' };
        if (stats.completedProjects === stats.totalProjects) return { score: 'A+', class: 'excellent', title: 'All Complete', message: 'Great work!' };
        return { score: 'A', class: 'excellent', title: 'Operational', message: `${stats.activeProjects} active` };
      };

      const health = getHealth();

      return (
        <div className="app-shell">
          <aside className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo">
                <div className="sidebar-logo-icon">⚡</div>
                <span>AI-SDLC</span>
              </div>
            </div>
            <nav className="sidebar-nav">
              <div className="nav-section">
                <div className="nav-section-title">Views</div>
                {[
                  { id: 'executive', icon: '📊', label: 'Executive' },
                  { id: 'projects', icon: '📁', label: 'Projects' },
                  { id: 'analytics', icon: '📈', label: 'Analytics' },
                  { id: 'agents', icon: '🤖', label: 'Agents' },
                  { id: 'activity', icon: '🕐', label: 'Activity' }
                ].map(nav => (
                  <div
                    key={nav.id}
                    className={`nav-item ${activeView === nav.id ? 'active' : ''}`}
                    onClick={() => setActiveView(nav.id)}
                  >
                    <span className="nav-item-icon">{nav.icon}</span>
                    {nav.label}
                  </div>
                ))}
              </div>
            </nav>
            <div className="sidebar-footer">
              <div className="status-indicator">
                <div className="status-dot"></div>
                <span>v2.2.0 • {lastUpdate.toLocaleTimeString()}</span>
              </div>
            </div>
          </aside>

          <main className="main-content">
            <div className="top-bar">
              <h1 className="page-title">
                {{ executive: 'Executive Dashboard', projects: 'Projects', analytics: 'Analytics', agents: 'Agents', activity: 'Activity' }[activeView]}
              </h1>
              <button className="btn btn-secondary" onClick={fetchData}>↻ Refresh</button>
            </div>

            <div className="content-area">
              {activeView === 'executive' && <Executive stats={stats} health={health} totalCost={totalCost} projects={projects} activity={activity} costs={costs} />}
              {activeView === 'projects' && <Projects projects={projects} costs={costs} />}
              {activeView === 'analytics' && <Analytics costs={costs} projects={projects} />}
              {activeView === 'agents' && <Agents costs={costs} />}
              {activeView === 'activity' && <ActivityView activity={activity} />}
            </div>
          </main>
        </div>
      );
    }

    // Executive View
    function Executive({ stats, health, totalCost, projects, activity, costs }) {
      const successRate = stats.totalProjects > 0 ? Math.round((stats.completedProjects / stats.totalProjects) * 100) : 100;

      return (
        <div>
          <div className="health-indicator">
            <div className={`health-score ${health.class}`}>{health.score}</div>
            <div className="health-details">
              <div className="health-title">{health.title}</div>
              <div className="health-message">{health.message}</div>
            </div>
            <span className="badge badge-success">v2.2.0</span>
          </div>

          <div className="grid-4 mb-xl">
            <div className="metric-card">
              <span className="metric-label">Projects</span>
              <span className="metric-value text-blue">{stats.totalProjects}</span>
              <span className="metric-change text-muted">Total</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">Success Rate</span>
              <span className="metric-value text-green">{successRate}%</span>
              <span className="metric-change text-muted">{stats.completedProjects} done</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">Spent</span>
              <span className="metric-value" style={{color:'#06b6d4'}}>${totalCost.toFixed(2)}</span>
              <span className="metric-change text-muted">All projects</span>
            </div>
            <div className="metric-card">
              <span className="metric-label">Active</span>
              <span className="metric-value text-purple">{stats.activeProjects}</span>
              <span className="metric-change">{stats.blockedProjects > 0 ? <span className="text-red">{stats.blockedProjects} blocked</span> : <span className="text-muted">No blockers</span>}</span>
            </div>
          </div>

          <div className="grid-2">
            <div className="card">
              <div className="section-header"><h3 className="section-title">Recent Projects</h3></div>
              {projects.length === 0 ? (
                <div className="empty-state"><div className="empty-state-icon">📁</div><div className="empty-state-title">No projects</div><p>Run /sdlc-start</p></div>
              ) : projects.slice(0, 4).map(p => <ProjectMini key={p.id} project={p} costs={costs} />)}
            </div>
            <div className="card">
              <div className="section-header"><h3 className="section-title">Recent Activity</h3></div>
              {activity.length === 0 ? (
                <div className="empty-state"><div className="empty-state-icon">🕐</div><div className="empty-state-title">No activity</div></div>
              ) : activity.slice(0, 5).map((a, i) => <ActivityItem key={i} item={a} />)}
            </div>
          </div>
        </div>
      );
    }

    function ProjectMini({ project, costs }) {
      const cost = costs.find(c => c.project_id === project.id);
      const color = { completed: '#10b981', active: '#3b82f6', in_progress: '#3b82f6', blocked: '#ef4444' }[project.status] || '#f59e0b';
      return (
        <div className="activity-item">
          <div className="activity-icon" style={{ background: `${color}20`, color }}>📁</div>
          <div className="activity-content">
            <div className="activity-text">{project.description || project.id}</div>
            <div className="activity-time">{project.status}{cost ? ` • $${(cost.total_cost || 0).toFixed(2)}` : ''}</div>
          </div>
        </div>
      );
    }

    // Projects View
    function Projects({ projects, costs }) {
      if (projects.length === 0) return <div className="empty-state"><div className="empty-state-icon">📁</div><div className="empty-state-title">No Projects</div><p>/sdlc-start to begin</p></div>;

      return <div>{projects.map(p => <ProjectCard key={p.id} project={p} costs={costs} />)}</div>;
    }

    function ProjectCard({ project, costs }) {
      const cost = costs.find(c => c.project_id === project.id);
      const phases = project.phases || {};
      const completed = Object.values(phases).filter(p => p === 'completed').length;
      const progress = Math.round((completed / PIPELINE_AGENTS.length) * 100);

      const getStatus = (id) => {
        const p = phases[id];
        if (p === 'completed') return 'completed';
        if (p === 'active' || p === 'in_progress') return 'active';
        if (p === 'blocked') return 'blocked';
        return 'pending';
      };

      const badge = { completed: ['badge-success', 'Done'], active: ['badge-info', 'Active'], in_progress: ['badge-info', 'Active'], blocked: ['badge-danger', 'Blocked'] }[project.status] || ['badge-warning', 'Pending'];

      return (
        <div className="project-card">
          <div className="project-header">
            <div>
              <h3 className="project-name">{project.description || project.id}</h3>
              <div className="project-id">{project.id}</div>
            </div>
            <div className="project-meta">
              <span className={`badge ${badge[0]}`}>{badge[1]}</span>
              {cost && <div className="project-cost">${(cost.total_cost || 0).toFixed(2)}</div>}
            </div>
          </div>

          <div className="agent-pipeline">
            {PIPELINE_AGENTS.map((id, i) => {
              const agent = AGENTS.find(a => a.id === id);
              const status = getStatus(id);
              return (
                <React.Fragment key={id}>
                  <div className="pipeline-agent">
                    <div className={`pipeline-icon ${status}`}>{agent?.icon}</div>
                    <span className="pipeline-name">{agent?.role}</span>
                  </div>
                  {i < PIPELINE_AGENTS.length - 1 && <div className={`pipeline-connector ${status === 'completed' ? 'completed' : ''}`}></div>}
                </React.Fragment>
              );
            })}
          </div>

          <div className="project-footer">
            <div className="project-progress">
              <div className="progress-label"><span>Progress</span><span>{progress}%</span></div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%`, background: project.status === 'blocked' ? '#ef4444' : progress === 100 ? '#10b981' : 'linear-gradient(90deg, #3b82f6, #8b5cf6)' }}></div>
              </div>
            </div>
            <div className="project-time">{project.created_at && new Date(project.created_at).toLocaleDateString()}</div>
          </div>
        </div>
      );
    }

    // Analytics View
    function Analytics({ costs, projects }) {
      const agentCosts = {};
      costs.forEach(c => (c.breakdown_by_agent || []).forEach(a => {
        if (!agentCosts[a.agent]) agentCosts[a.agent] = { cost: 0, invocations: 0, tokens: 0 };
        agentCosts[a.agent].cost += a.cost || 0;
        agentCosts[a.agent].invocations += a.invocations || 0;
        agentCosts[a.agent].tokens += a.tokens || 0;
      }));

      const totalCost = costs.reduce((s, c) => s + (c.total_cost || 0), 0);
      const totalTokens = costs.reduce((s, c) => s + (c.total_tokens || 0), 0);

      const modelUsage = {};
      AGENTS.forEach(a => { if (!modelUsage[a.model]) modelUsage[a.model] = 0; modelUsage[a.model] += agentCosts[a.id]?.invocations || 0; });

      return (
        <div>
          <div className="grid-4 mb-xl">
            <div className="metric-card"><span className="metric-label">Total Spent</span><span className="metric-value" style={{color:'#06b6d4'}}>${totalCost.toFixed(2)}</span></div>
            <div className="metric-card"><span className="metric-label">Tokens</span><span className="metric-value text-purple">{(totalTokens/1000).toFixed(1)}K</span></div>
            <div className="metric-card"><span className="metric-label">Avg/Project</span><span className="metric-value text-blue">${projects.length ? (totalCost/projects.length).toFixed(2) : '0'}</span></div>
            <div className="metric-card"><span className="metric-label">$/1K Tokens</span><span className="metric-value text-green">${totalTokens ? ((totalCost/totalTokens)*1000).toFixed(4) : '0'}</span></div>
          </div>

          <div className="grid-2 mb-xl">
            <div className="chart-container">
              <div className="chart-header"><h3 className="chart-title">Model Distribution</h3></div>
              <div style={{padding:'var(--space-md)'}}>
                {Object.entries(modelUsage).map(([m, c]) => {
                  const t = Object.values(modelUsage).reduce((a,b) => a+b, 0);
                  const p = t ? (c/t)*100 : 0;
                  const col = m === 'Opus' ? '#8b5cf6' : m === 'Sonnet' ? '#3b82f6' : '#10b981';
                  return (
                    <div key={m} style={{marginBottom:'var(--space-md)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
                        <span style={{fontSize:'14px',fontWeight:500}}>{m}</span>
                        <span style={{fontSize:'14px',color:'var(--text-secondary)'}}>{c} ({p.toFixed(0)}%)</span>
                      </div>
                      <div className="progress-bar"><div className="progress-fill" style={{width:`${p}%`,background:col}}></div></div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="chart-container">
              <div className="chart-header"><h3 className="chart-title">Cost by Agent</h3></div>
              <div style={{padding:'var(--space-md)'}}>
                {Object.entries(agentCosts).sort((a,b) => b[1].cost - a[1].cost).slice(0,6).map(([id, d]) => {
                  const agent = AGENTS.find(a => a.id === id);
                  const max = Math.max(...Object.values(agentCosts).map(x => x.cost), 1);
                  const p = (d.cost/max)*100;
                  return (
                    <div key={id} style={{marginBottom:'var(--space-md)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}>
                        <span style={{fontSize:'14px'}}>{agent?.icon} {agent?.name}</span>
                        <span style={{fontSize:'14px',color:'#06b6d4'}}>${d.cost.toFixed(2)}</span>
                      </div>
                      <div className="progress-bar"><div className="progress-fill" style={{width:`${p}%`,background:agent?.color || '#3b82f6'}}></div></div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Agents View
    function Agents({ costs }) {
      const agentCosts = {};
      costs.forEach(c => (c.breakdown_by_agent || []).forEach(a => {
        if (!agentCosts[a.agent]) agentCosts[a.agent] = { cost: 0, invocations: 0 };
        agentCosts[a.agent].cost += a.cost || 0;
        agentCosts[a.agent].invocations += a.invocations || 0;
      }));

      const core = AGENTS.filter(a => PIPELINE_AGENTS.includes(a.id) || a.id === 'conductor');
      const support = AGENTS.filter(a => ['ask-tom', 'finops', 'tracker'].includes(a.id));

      return (
        <div>
          <div className="section-header"><h3 className="section-title">Pipeline Agents</h3><p className="section-subtitle">Core SDLC workflow</p></div>
          <div className="grid-3 mb-xl">{core.map(a => <AgentCard key={a.id} agent={a} data={agentCosts[a.id]} />)}</div>

          <div className="section-header"><h3 className="section-title">Support Agents</h3><p className="section-subtitle">On-demand specialists</p></div>
          <div className="grid-3">{support.map(a => <AgentCard key={a.id} agent={a} data={agentCosts[a.id]} />)}</div>
        </div>
      );
    }

    function AgentCard({ agent, data }) {
      return (
        <div className="agent-card">
          <div className="agent-avatar" style={{ background: `${agent.color}20`, color: agent.color }}>{agent.icon}</div>
          <div className="agent-info">
            <div className="agent-name">{agent.name}</div>
            <div className="agent-role">{agent.role} • {agent.model}</div>
          </div>
          <div className="agent-stats">
            <div className="agent-invocations">{data?.invocations || 0}</div>
            <div className="agent-cost">${(data?.cost || 0).toFixed(2)}</div>
          </div>
        </div>
      );
    }

    // Activity View
    function ActivityView({ activity }) {
      if (!activity.length) return <div className="empty-state"><div className="empty-state-icon">🕐</div><div className="empty-state-title">No Activity</div></div>;
      return <div className="card">{activity.map((a, i) => <ActivityItem key={i} item={a} />)}</div>;
    }

    function ActivityItem({ item }) {
      const agent = AGENTS.find(a => a.id === item.agent) || { icon: '🔄', color: '#64748b' };
      const color = { start: '#3b82f6', complete: '#10b981', block: '#ef4444' }[item.action] || agent.color;
      return (
        <div className="activity-item">
          <div className="activity-icon" style={{ background: `${color}20`, color }}>{agent.icon}</div>
          <div className="activity-content">
            <div className="activity-text"><strong>{agent.name || item.agent}</strong> {item.action}{item.project_id && <span className="text-muted"> on {item.project_id}</span>}</div>
            <div className="activity-time">{item.timestamp && new Date(item.timestamp).toLocaleString()}</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
