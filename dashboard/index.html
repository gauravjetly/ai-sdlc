<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-SDLC Control Center</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: hidden;
    }
    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lucide icon components (simplified versions)
    const Icon = ({ children, size = 16, ...props }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {children}
      </svg>
    );

    const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></Icon>;
    const XCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></Icon>;
    const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
    const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></Icon>;
    const Activity = (props) => <Icon {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></Icon>;
    const GitBranch = (props) => <Icon {...props}><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></Icon>;
    const Layers = (props) => <Icon {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></Icon>;
    const RefreshCw = (props) => <Icon {...props}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></Icon>;
    const ChevronRight = (props) => <Icon {...props}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
    const Zap = (props) => <Icon {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></Icon>;

    // Agent definitions
    const AGENTS = [
      { id: 'conductor', name: 'Conductor', icon: '🎭', color: '#081581', model: 'Opus', role: 'Orchestrator' },
      { id: 'ba', name: 'BA Agent', icon: '📋', color: '#1742F6', model: 'Sonnet', role: 'Requirements' },
      { id: 'jets', name: 'Jets', icon: '🏗️', color: '#6D18F1', model: 'Opus', role: 'Architecture' },
      { id: 'engineer', name: 'Engineer', icon: '💻', color: '#00B6C3', model: 'Sonnet', role: 'Development' },
      { id: 'security', name: 'Security', icon: '🔒', color: '#ef4444', model: 'Sonnet', role: 'Security Review' },
      { id: 'qa', name: 'QA Agent', icon: '🧪', color: '#f59e0b', model: 'Sonnet', role: 'Testing' },
      { id: 'atlas', name: 'Atlas', icon: '🚀', color: '#8b5cf6', model: 'Sonnet', role: 'Deployment' },
      { id: 'customer', name: 'Customer', icon: '✅', color: '#22c55e', model: 'Sonnet', role: 'Acceptance' },
      { id: 'finops', name: 'FinOps', icon: '💰', color: '#fbbf24', model: 'Haiku', role: 'Cost Tracking' },
      { id: 'tracker', name: 'Tracker', icon: '📊', color: '#64748b', model: 'Haiku', role: 'Monitoring' },
    ];

    function SDLCControlCenter() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedProject, setSelectedProject] = useState(null);
      const [projects, setProjects] = useState([]);
      const [activity, setActivity] = useState([]);
      const [registry, setRegistry] = useState(null);
      const [costs, setCosts] = useState([]);
      const [totalBudget, setTotalBudget] = useState(0);
      const [totalSpent, setTotalSpent] = useState(0);
      const [lastUpdate, setLastUpdate] = useState(new Date());
      const [isLoading, setIsLoading] = useState(true);

      // Fetch data from API
      const fetchData = async () => {
        try {
          const [registryRes, projectsRes, activityRes, costsRes] = await Promise.all([
            fetch('/api/registry'),
            fetch('/api/projects'),
            fetch('/api/activity?limit=50'),
            fetch('/api/costs')
          ]);

          const registryData = await registryRes.json();
          const projectsData = await projectsRes.json();
          const activityData = await activityRes.json();
          const costsData = await costsRes.json();

          // Calculate total budget and spent
          const budget = costsData.reduce((sum, cost) => sum + (cost.budget || 0), 0);
          const spent = costsData.reduce((sum, cost) => sum + (cost.total_cost || 0), 0);

          setRegistry(registryData);
          setProjects(projectsData);
          setActivity(activityData);
          setCosts(costsData);
          setTotalBudget(budget);
          setTotalSpent(spent);
          setLastUpdate(new Date());
          setIsLoading(false);
        } catch (error) {
          console.error('Error fetching data:', error);
          setIsLoading(false);
        }
      };

      // Initial load and auto-refresh every 3 seconds
      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 3000);
        return () => clearInterval(interval);
      }, []);

      const getStatusColor = (status) => {
        switch (status) {
          case 'complete': return '#22c55e';
          case 'in_progress': return '#3b82f6';
          case 'blocked': return '#ef4444';
          case 'pending': return '#94a3b8';
          default: return '#64748b';
        }
      };

      const getStatusIcon = (status) => {
        switch (status) {
          case 'complete': return <CheckCircle size={16} />;
          case 'in_progress': return <Play size={16} />;
          case 'blocked': return <XCircle size={16} />;
          case 'pending': return <Clock size={16} />;
          default: return <Clock size={16} />;
        }
      };

      const getAgent = (id) => AGENTS.find(a => a.id === id) || AGENTS[0];

      // Helper function for budget status
      const getBudgetStatus = (spent, budget) => {
        if (!budget || budget === 0) {
          return { color: '#64748b', indicator: '⚪', label: 'No Budget' };
        }
        const pct = (spent / budget) * 100;
        if (pct >= 90) return { color: '#ef4444', indicator: '🔴', label: 'Critical' };
        if (pct >= 50) return { color: '#f59e0b', indicator: '🟡', label: 'Warning' };
        return { color: '#22c55e', indicator: '🟢', label: 'Healthy' };
      };

      // Helper function for currency formatting
      const formatCost = (amount, currency = 'USD') => {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: currency
        }).format(amount || 0);
      };

      // Helper function for cost efficiency metrics
      const calculateCostEfficiency = () => {
        const totalTokens = costs.reduce((sum, cost) => sum + (cost.total_tokens || 0), 0);
        const avgCostPerProject = costs.length > 0 ? totalSpent / costs.length : 0;
        const costPer1KTokens = totalTokens > 0 ? (totalSpent / totalTokens) * 1000 : 0;
        return { totalTokens, avgCostPerProject, costPer1KTokens };
      };

      const stats = registry ? registry.stats : {
        totalProjects: 0,
        completedProjects: 0,
        activeProjects: 0,
        blockedProjects: 0
      };

      if (isLoading) {
        return (
          <div style={{
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            height: '100vh',
            flexDirection: 'column',
            gap: '16px'
          }}>
            <RefreshCw size={48} style={{ animation: 'spin 1s linear infinite' }} />
            <div style={{ fontSize: '18px', color: '#94a3b8' }}>Loading Control Center...</div>
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        );
      }

      return (
        <div style={{
          fontFamily: 'system-ui, -apple-system, sans-serif',
          background: '#0f172a',
          minHeight: '100vh',
          color: '#e2e8f0'
        }}>
          {/* Header */}
          <div style={{
            background: 'linear-gradient(135deg, #081581 0%, #1742F6 50%, #6D18F1 100%)',
            padding: '20px 24px',
            borderBottom: '1px solid #334155'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <h1 style={{ margin: 0, fontSize: '24px', fontWeight: 700, display: 'flex', alignItems: 'center', gap: '12px' }}>
                  <Layers size={28} />
                  AI-SDLC Control Center
                </h1>
                <p style={{ margin: '4px 0 0 0', fontSize: '14px', opacity: 0.8 }}>
                  Real-time agent workflow monitoring • Last update: {lastUpdate.toLocaleTimeString()}
                </p>
              </div>
              <div style={{ display: 'flex', gap: '8px' }}>
                <button
                  onClick={fetchData}
                  style={{
                    background: 'rgba(255,255,255,0.1)',
                    border: '1px solid rgba(255,255,255,0.2)',
                    borderRadius: '6px',
                    padding: '8px 16px',
                    color: '#fff',
                    cursor: 'pointer',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '6px',
                    fontSize: '14px'
                  }}
                >
                  <RefreshCw size={16} />
                  Refresh Now
                </button>
              </div>
            </div>
          </div>

          {/* Navigation Tabs */}
          <div style={{
            background: '#1e293b',
            padding: '0 24px',
            display: 'flex',
            gap: '4px',
            borderBottom: '1px solid #334155'
          }}>
            {['dashboard', 'projects', 'agents', 'costs', 'activity'].map(tab => (
              <button
                key={tab}
                onClick={() => setActiveTab(tab)}
                style={{
                  background: activeTab === tab ? '#0f172a' : 'transparent',
                  border: 'none',
                  borderBottom: activeTab === tab ? '2px solid #3b82f6' : '2px solid transparent',
                  padding: '12px 20px',
                  color: activeTab === tab ? '#fff' : '#94a3b8',
                  cursor: 'pointer',
                  fontSize: '14px',
                  fontWeight: 500,
                  textTransform: 'capitalize'
                }}
              >
                {tab}
              </button>
            ))}
          </div>

          {/* Main Content */}
          <div style={{ padding: '24px' }}>

            {/* Dashboard Tab */}
            {activeTab === 'dashboard' && (
              <div>
                {/* Stats Cards */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '16px', marginBottom: '24px' }}>
                  {[
                    { label: 'Total Projects', value: stats.totalProjects, color: '#3b82f6', icon: <GitBranch size={20} /> },
                    { label: 'Completed', value: stats.completedProjects, color: '#22c55e', icon: <CheckCircle size={20} /> },
                    { label: 'In Progress', value: stats.activeProjects, color: '#f59e0b', icon: <Activity size={20} /> },
                    { label: 'Blocked', value: stats.blockedProjects, color: '#ef4444', icon: <XCircle size={20} /> },
                  ].map((stat, i) => (
                    <div key={i} style={{
                      background: '#1e293b',
                      borderRadius: '12px',
                      padding: '20px',
                      border: '1px solid #334155'
                    }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
                        <div>
                          <p style={{ margin: 0, fontSize: '13px', color: '#94a3b8' }}>{stat.label}</p>
                          <p style={{ margin: '8px 0 0 0', fontSize: '32px', fontWeight: 700, color: stat.color }}>{stat.value}</p>
                        </div>
                        <div style={{ color: stat.color, opacity: 0.5 }}>{stat.icon}</div>
                      </div>
                    </div>
                  ))}
                  {/* Total Spent Card */}
                  <div style={{
                    background: '#1e293b',
                    borderRadius: '12px',
                    padding: '20px',
                    border: '1px solid #334155'
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
                      <div>
                        <p style={{ margin: 0, fontSize: '13px', color: '#94a3b8' }}>Total Spent</p>
                        <p style={{ margin: '8px 0 0 0', fontSize: '32px', fontWeight: 700, color: '#fbbf24' }}>
                          {formatCost(totalSpent)}
                        </p>
                        <div style={{
                          display: 'flex',
                          alignItems: 'center',
                          gap: '4px',
                          marginTop: '8px',
                          fontSize: '11px',
                          color: getBudgetStatus(totalSpent, totalBudget).color
                        }}>
                          <span>{getBudgetStatus(totalSpent, totalBudget).indicator}</span>
                          <span>{getBudgetStatus(totalSpent, totalBudget).label}</span>
                        </div>
                      </div>
                      <div style={{ color: '#fbbf24', opacity: 0.5, fontSize: '20px' }}>💰</div>
                    </div>
                  </div>
                </div>

                {/* Budget Utilization Progress Bar */}
                {totalBudget > 0 && (
                  <div style={{
                    background: '#1e293b',
                    borderRadius: '12px',
                    padding: '16px',
                    border: '1px solid #334155',
                    marginBottom: '24px'
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                      <span style={{ fontSize: '13px', fontWeight: 600 }}>Budget Utilization</span>
                      <span style={{ fontSize: '13px', color: '#94a3b8' }}>
                        {formatCost(totalSpent)} / {formatCost(totalBudget)} ({Math.round((totalSpent / totalBudget) * 100)}%)
                      </span>
                    </div>
                    <div style={{
                      width: '100%',
                      height: '12px',
                      background: '#0f172a',
                      borderRadius: '6px',
                      overflow: 'hidden'
                    }}>
                      <div style={{
                        width: `${Math.min((totalSpent / totalBudget) * 100, 100)}%`,
                        height: '100%',
                        background: getBudgetStatus(totalSpent, totalBudget).color,
                        transition: 'width 0.3s ease, background 0.3s ease'
                      }} />
                    </div>
                  </div>
                )}

                {/* Agent Workflow */}
                <div style={{
                  background: '#1e293b',
                  borderRadius: '12px',
                  padding: '20px',
                  border: '1px solid #334155',
                  marginBottom: '24px'
                }}>
                  <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: 600 }}>Agent Workflow</h2>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px', overflowX: 'auto', padding: '8px 0' }}>
                    {AGENTS.filter(a => a.id !== 'tracker' && a.id !== 'finops').map((agent, i) => (
                      <React.Fragment key={agent.id}>
                        <div style={{
                          background: agent.color,
                          borderRadius: '8px',
                          padding: '12px 16px',
                          minWidth: '100px',
                          textAlign: 'center'
                        }}>
                          <div style={{ fontSize: '24px', marginBottom: '4px' }}>{agent.icon}</div>
                          <div style={{ fontSize: '12px', fontWeight: 600 }}>{agent.name}</div>
                          <div style={{ fontSize: '10px', opacity: 0.8 }}>{agent.model}</div>
                        </div>
                        {i < AGENTS.filter(a => a.id !== 'tracker' && a.id !== 'finops').length - 1 && (
                          <ChevronRight size={20} style={{ color: '#64748b', flexShrink: 0 }} />
                        )}
                      </React.Fragment>
                    ))}
                  </div>
                  <div style={{
                    marginTop: '12px',
                    padding: '12px',
                    background: '#0f172a',
                    borderRadius: '8px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '12px',
                    fontSize: '12px'
                  }}>
                    <div style={{
                      background: '#fbbf24',
                      borderRadius: '6px',
                      padding: '8px 12px',
                      minWidth: '80px',
                      textAlign: 'center'
                    }}>
                      <div style={{ fontSize: '20px', marginBottom: '2px' }}>💰</div>
                      <div style={{ fontSize: '11px', fontWeight: 600 }}>FinOps</div>
                      <div style={{ fontSize: '9px', opacity: 0.8 }}>Haiku</div>
                    </div>
                    <div style={{ flex: 1, color: '#94a3b8' }}>
                      Tracks costs across all agents • Real-time budget monitoring • Optimization recommendations
                    </div>
                  </div>
                </div>

                {/* Recent Activity */}
                <div style={{
                  background: '#1e293b',
                  borderRadius: '12px',
                  padding: '20px',
                  border: '1px solid #334155'
                }}>
                  <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: 600 }}>
                    Recent Activity {activity.length > 0 && `(${activity.length} events)`}
                  </h2>
                  {activity.length === 0 ? (
                    <div style={{
                      padding: '40px',
                      textAlign: 'center',
                      color: '#64748b',
                      fontSize: '14px'
                    }}>
                      No activity yet. Start a workflow with /sdlc-start to see updates here.
                    </div>
                  ) : (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                      {activity.slice(0, 10).map((item, i) => {
                        const agent = getAgent(item.agent);
                        return (
                          <div key={i} style={{
                            display: 'flex',
                            alignItems: 'center',
                            gap: '12px',
                            padding: '12px',
                            background: '#0f172a',
                            borderRadius: '8px',
                            borderLeft: `3px solid ${agent.color}`
                          }}>
                            <div style={{ fontSize: '20px' }}>{agent.icon}</div>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: '14px', fontWeight: 500 }}>{item.action}</div>
                              <div style={{ fontSize: '12px', color: '#64748b' }}>
                                {agent.name} • {item.project}
                              </div>
                            </div>
                            <div style={{
                              fontSize: '11px',
                              color: '#64748b',
                              whiteSpace: 'nowrap'
                            }}>
                              {new Date(item.timestamp).toLocaleTimeString()}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Projects Tab */}
            {activeTab === 'projects' && (
              <div>
                {projects.length === 0 ? (
                  <div style={{
                    background: '#1e293b',
                    borderRadius: '12px',
                    padding: '60px',
                    border: '1px solid #334155',
                    textAlign: 'center'
                  }}>
                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>📁</div>
                    <h3 style={{ fontSize: '18px', marginBottom: '8px', fontWeight: 600 }}>No Projects Yet</h3>
                    <p style={{ color: '#64748b', fontSize: '14px' }}>
                      Start a workflow with /sdlc-start to create your first project
                    </p>
                  </div>
                ) : (
                  <div style={{ display: 'flex', gap: '24px' }}>
                    {/* Project List */}
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                        {projects.map(project => (
                          <div
                            key={project.id}
                            onClick={() => setSelectedProject(project)}
                            style={{
                              background: selectedProject?.id === project.id ? '#334155' : '#1e293b',
                              borderRadius: '12px',
                              padding: '16px',
                              border: '1px solid #334155',
                              cursor: 'pointer',
                              transition: 'all 0.2s'
                            }}
                          >
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '12px' }}>
                              <div>
                                <h3 style={{ margin: 0, fontSize: '16px', fontWeight: 600 }}>{project.name}</h3>
                                <p style={{ margin: '4px 0 0 0', fontSize: '12px', color: '#64748b' }}>{project.id}</p>
                              </div>
                              <div style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '6px',
                                padding: '4px 10px',
                                borderRadius: '12px',
                                fontSize: '12px',
                                fontWeight: 500,
                                background: `${getStatusColor(project.status)}20`,
                                color: getStatusColor(project.status)
                              }}>
                                {getStatusIcon(project.status)}
                                {project.status.replace('_', ' ')}
                              </div>
                            </div>

                            {/* Cost Information */}
                            {project.cost && (
                              <div style={{
                                background: '#0f172a',
                                borderRadius: '8px',
                                padding: '10px',
                                marginBottom: '12px',
                                display: 'flex',
                                justifyContent: 'space-between',
                                alignItems: 'center'
                              }}>
                                <div style={{ fontSize: '12px', color: '#94a3b8' }}>
                                  Cost: <span style={{ color: '#fbbf24', fontWeight: 600 }}>{formatCost(project.cost.total_cost)}</span>
                                  {project.cost.budget > 0 && (
                                    <span> / {formatCost(project.cost.budget)}</span>
                                  )}
                                </div>
                                <span style={{ fontSize: '14px' }}>
                                  {getBudgetStatus(project.cost.total_cost, project.cost.budget).indicator}
                                </span>
                              </div>
                            )}

                            {/* Phase Progress */}
                            {project.phases && (
                              <div style={{ display: 'flex', gap: '4px' }}>
                                {project.phases.map((phase, i) => {
                                  const agent = getAgent(phase.agent);
                                  return (
                                    <div
                                      key={i}
                                      title={`${agent.name}: ${phase.status}`}
                                      style={{
                                        flex: 1,
                                        height: '6px',
                                        borderRadius: '3px',
                                        background: phase.status === 'complete' ? agent.color :
                                                   phase.status === 'in_progress' ? `${agent.color}80` :
                                                   phase.status === 'blocked' ? '#ef4444' : '#334155'
                                      }}
                                    />
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Project Detail */}
                    {selectedProject && selectedProject.phases && (
                      <div style={{
                        width: '400px',
                        background: '#1e293b',
                        borderRadius: '12px',
                        padding: '20px',
                        border: '1px solid #334155',
                        height: 'fit-content'
                      }}>
                        <h2 style={{ margin: '0 0 4px 0', fontSize: '18px', fontWeight: 600 }}>{selectedProject.name}</h2>
                        <p style={{ margin: '0 0 20px 0', fontSize: '12px', color: '#64748b' }}>{selectedProject.id}</p>

                        {/* Cost Breakdown */}
                        {selectedProject.cost && (
                          <div style={{ marginBottom: '20px' }}>
                            <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: 600, color: '#94a3b8' }}>Cost Breakdown</h3>
                            <div style={{
                              background: '#0f172a',
                              borderRadius: '8px',
                              padding: '12px',
                              marginBottom: '12px'
                            }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '13px' }}>
                                <span style={{ color: '#94a3b8' }}>Total Cost</span>
                                <span style={{ color: '#fbbf24', fontWeight: 600 }}>{formatCost(selectedProject.cost.total_cost)}</span>
                              </div>
                              {selectedProject.cost.budget > 0 && (
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '13px' }}>
                                  <span style={{ color: '#94a3b8' }}>Budget</span>
                                  <span style={{ fontWeight: 500 }}>{formatCost(selectedProject.cost.budget)}</span>
                                </div>
                              )}
                              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '13px' }}>
                                <span style={{ color: '#94a3b8' }}>Total Tokens</span>
                                <span style={{ fontWeight: 500 }}>{selectedProject.cost.total_tokens?.toLocaleString()}</span>
                              </div>
                              {selectedProject.cost.budget > 0 && (
                                <div style={{
                                  marginTop: '12px',
                                  paddingTop: '12px',
                                  borderTop: '1px solid #334155',
                                  display: 'flex',
                                  alignItems: 'center',
                                  gap: '8px',
                                  fontSize: '12px'
                                }}>
                                  <span style={{ fontSize: '16px' }}>
                                    {getBudgetStatus(selectedProject.cost.total_cost, selectedProject.cost.budget).indicator}
                                  </span>
                                  <span style={{ color: getBudgetStatus(selectedProject.cost.total_cost, selectedProject.cost.budget).color }}>
                                    {getBudgetStatus(selectedProject.cost.total_cost, selectedProject.cost.budget).label}
                                  </span>
                                  <span style={{ marginLeft: 'auto', color: '#64748b' }}>
                                    {Math.round((selectedProject.cost.total_cost / selectedProject.cost.budget) * 100)}% used
                                  </span>
                                </div>
                              )}
                            </div>
                            {/* Cost by Agent */}
                            {selectedProject.cost.breakdown_by_agent && selectedProject.cost.breakdown_by_agent.length > 0 && (
                              <div>
                                <h4 style={{ margin: '0 0 8px 0', fontSize: '12px', fontWeight: 600, color: '#94a3b8' }}>By Agent</h4>
                                {selectedProject.cost.breakdown_by_agent.map((agentCost, i) => {
                                  const agent = getAgent(agentCost.agent);
                                  return (
                                    <div key={i} style={{
                                      background: '#0f172a',
                                      borderRadius: '6px',
                                      padding: '8px',
                                      marginBottom: '6px',
                                      display: 'flex',
                                      justifyContent: 'space-between',
                                      alignItems: 'center'
                                    }}>
                                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <span style={{ fontSize: '14px' }}>{agent.icon}</span>
                                        <span style={{ fontSize: '11px', color: '#94a3b8' }}>{agent.name}</span>
                                      </div>
                                      <span style={{ fontSize: '11px', color: '#fbbf24', fontWeight: 600 }}>
                                        {formatCost(agentCost.cost)}
                                      </span>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        )}

                        <h3 style={{ margin: '0 0 12px 0', fontSize: '14px', fontWeight: 600, color: '#94a3b8' }}>Phase Details</h3>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                          {selectedProject.phases.map((phase, i) => {
                            const agent = getAgent(phase.agent);
                            return (
                              <div key={i} style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '12px',
                                padding: '10px',
                                background: '#0f172a',
                                borderRadius: '8px',
                                borderLeft: `3px solid ${phase.status === 'blocked' ? '#ef4444' : agent.color}`
                              }}>
                                <div style={{ fontSize: '18px' }}>{agent.icon}</div>
                                <div style={{ flex: 1 }}>
                                  <div style={{ fontSize: '13px', fontWeight: 500 }}>{agent.name}</div>
                                  {phase.output && (
                                    <div style={{ fontSize: '11px', color: '#64748b' }}>{phase.output}</div>
                                  )}
                                  {phase.reason && (
                                    <div style={{ fontSize: '11px', color: '#ef4444' }}>{phase.reason}</div>
                                  )}
                                </div>
                                <div style={{ textAlign: 'right' }}>
                                  <div style={{ color: getStatusColor(phase.status) }}>
                                    {getStatusIcon(phase.status)}
                                  </div>
                                  {phase.duration && (
                                    <div style={{ fontSize: '10px', color: '#64748b' }}>{phase.duration}</div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* Agents Tab */}
            {activeTab === 'agents' && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px' }}>
                {AGENTS.map(agent => {
                  const agentStats = registry?.agents?.[agent.id] || { invocations: 0, totalDuration: 0 };

                  // Calculate total cost for this agent across all projects
                  let agentTotalCost = 0;
                  let agentTotalTokens = 0;
                  costs.forEach(projectCost => {
                    if (projectCost.breakdown_by_agent) {
                      const agentBreakdown = projectCost.breakdown_by_agent.find(a => a.agent === agent.id);
                      if (agentBreakdown) {
                        agentTotalCost += agentBreakdown.cost || 0;
                        agentTotalTokens += agentBreakdown.tokens || 0;
                      }
                    }
                  });

                  return (
                    <div key={agent.id} style={{
                      background: '#1e293b',
                      borderRadius: '12px',
                      padding: '20px',
                      border: '1px solid #334155',
                      borderTop: `4px solid ${agent.color}`
                    }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                        <div style={{
                          fontSize: '32px',
                          width: '50px',
                          height: '50px',
                          background: `${agent.color}20`,
                          borderRadius: '12px',
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center'
                        }}>
                          {agent.icon}
                        </div>
                        <div>
                          <h3 style={{ margin: 0, fontSize: '18px', fontWeight: 600 }}>{agent.name}</h3>
                          <p style={{ margin: '2px 0 0 0', fontSize: '12px', color: '#64748b' }}>{agent.role}</p>
                        </div>
                      </div>

                      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                          <span style={{ color: '#94a3b8' }}>Model</span>
                          <span style={{ fontWeight: 500 }}>{agent.model}</span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                          <span style={{ color: '#94a3b8' }}>Invocations</span>
                          <span style={{ fontWeight: 500 }}>{agentStats.invocations}</span>
                        </div>
                        {agentTotalCost > 0 && (
                          <>
                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                              <span style={{ color: '#94a3b8' }}>Total Cost</span>
                              <span style={{ fontWeight: 600, color: '#fbbf24' }}>{formatCost(agentTotalCost)}</span>
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                              <span style={{ color: '#94a3b8' }}>Tokens</span>
                              <span style={{ fontWeight: 500 }}>{agentTotalTokens.toLocaleString()}</span>
                            </div>
                          </>
                        )}
                        {agentStats.blocked > 0 && (
                          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                            <span style={{ color: '#ef4444' }}>Blocked</span>
                            <span style={{ fontWeight: 500, color: '#ef4444' }}>{agentStats.blocked}</span>
                          </div>
                        )}
                        {agentStats.failed > 0 && (
                          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                            <span style={{ color: '#f59e0b' }}>Failed</span>
                            <span style={{ fontWeight: 500, color: '#f59e0b' }}>{agentStats.failed}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Costs Tab */}
            {activeTab === 'costs' && (
              <div>
                {costs.length === 0 ? (
                  <div style={{
                    background: '#1e293b',
                    borderRadius: '12px',
                    padding: '60px',
                    border: '1px solid #334155',
                    textAlign: 'center'
                  }}>
                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>💰</div>
                    <h3 style={{ fontSize: '18px', marginBottom: '8px', fontWeight: 600 }}>No Cost Data Yet</h3>
                    <p style={{ color: '#64748b', fontSize: '14px' }}>
                      Cost tracking will appear here after running workflows
                    </p>
                  </div>
                ) : (
                  <>
                    {/* Summary Cards */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px', marginBottom: '24px' }}>
                      <div style={{
                        background: '#1e293b',
                        borderRadius: '12px',
                        padding: '20px',
                        border: '1px solid #334155'
                      }}>
                        <p style={{ margin: 0, fontSize: '13px', color: '#94a3b8' }}>Total Budget</p>
                        <p style={{ margin: '8px 0 0 0', fontSize: '28px', fontWeight: 700, color: '#3b82f6' }}>
                          {formatCost(totalBudget)}
                        </p>
                      </div>
                      <div style={{
                        background: '#1e293b',
                        borderRadius: '12px',
                        padding: '20px',
                        border: '1px solid #334155'
                      }}>
                        <p style={{ margin: 0, fontSize: '13px', color: '#94a3b8' }}>Total Spent</p>
                        <p style={{ margin: '8px 0 0 0', fontSize: '28px', fontWeight: 700, color: '#fbbf24' }}>
                          {formatCost(totalSpent)}
                        </p>
                      </div>
                      <div style={{
                        background: '#1e293b',
                        borderRadius: '12px',
                        padding: '20px',
                        border: '1px solid #334155'
                      }}>
                        <p style={{ margin: 0, fontSize: '13px', color: '#94a3b8' }}>Remaining</p>
                        <p style={{ margin: '8px 0 0 0', fontSize: '28px', fontWeight: 700, color: '#22c55e' }}>
                          {formatCost(Math.max(0, totalBudget - totalSpent))}
                        </p>
                      </div>
                      <div style={{
                        background: '#1e293b',
                        borderRadius: '12px',
                        padding: '20px',
                        border: '1px solid #334155'
                      }}>
                        <p style={{ margin: 0, fontSize: '13px', color: '#94a3b8' }}>Budget Health</p>
                        <div style={{
                          margin: '8px 0 0 0',
                          display: 'flex',
                          alignItems: 'center',
                          gap: '8px'
                        }}>
                          <span style={{ fontSize: '28px' }}>
                            {getBudgetStatus(totalSpent, totalBudget).indicator}
                          </span>
                          <span style={{
                            fontSize: '16px',
                            fontWeight: 600,
                            color: getBudgetStatus(totalSpent, totalBudget).color
                          }}>
                            {getBudgetStatus(totalSpent, totalBudget).label}
                          </span>
                        </div>
                      </div>
                    </div>

                    {/* Cost by Agent Chart */}
                    <div style={{
                      background: '#1e293b',
                      borderRadius: '12px',
                      padding: '20px',
                      border: '1px solid #334155',
                      marginBottom: '24px'
                    }}>
                      <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: 600 }}>Cost by Agent</h2>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                        {AGENTS.filter(a => a.id !== 'tracker').map(agent => {
                          // Calculate agent cost across all projects
                          let agentCost = 0;
                          let agentTokens = 0;
                          let agentInvocations = 0;
                          costs.forEach(projectCost => {
                            if (projectCost.breakdown_by_agent) {
                              const breakdown = projectCost.breakdown_by_agent.find(a => a.agent === agent.id);
                              if (breakdown) {
                                agentCost += breakdown.cost || 0;
                                agentTokens += breakdown.tokens || 0;
                                agentInvocations += breakdown.invocations || 0;
                              }
                            }
                          });

                          const percentage = totalSpent > 0 ? (agentCost / totalSpent) * 100 : 0;

                          return (
                            <div key={agent.id} style={{
                              background: '#0f172a',
                              borderRadius: '8px',
                              padding: '12px'
                            }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '13px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                  <span style={{ fontSize: '18px' }}>{agent.icon}</span>
                                  <span style={{ fontWeight: 600 }}>{agent.name}</span>
                                  <span style={{ color: '#64748b' }}>• {agentInvocations} invocations • {agentTokens.toLocaleString()} tokens</span>
                                </div>
                                <span style={{ fontWeight: 600, color: '#fbbf24' }}>{formatCost(agentCost)}</span>
                              </div>
                              <div style={{
                                width: '100%',
                                height: '8px',
                                background: '#1e293b',
                                borderRadius: '4px',
                                overflow: 'hidden'
                              }}>
                                <div style={{
                                  width: `${percentage}%`,
                                  height: '100%',
                                  background: agent.color,
                                  transition: 'width 0.3s ease'
                                }} />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '24px', marginBottom: '24px' }}>
                      {/* Cost by Project */}
                      <div style={{
                        background: '#1e293b',
                        borderRadius: '12px',
                        padding: '20px',
                        border: '1px solid #334155'
                      }}>
                        <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: 600 }}>Cost by Project</h2>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
                          {costs.map((cost, i) => {
                            const status = getBudgetStatus(cost.total_cost, cost.budget);
                            const percentage = cost.budget > 0 ? (cost.total_cost / cost.budget) * 100 : 0;
                            return (
                              <div key={i} style={{
                                background: '#0f172a',
                                borderRadius: '8px',
                                padding: '12px',
                                borderLeft: `3px solid ${status.color}`
                              }}>
                                <div style={{ marginBottom: '8px' }}>
                                  <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '4px' }}>{cost.project_name}</div>
                                  <div style={{ fontSize: '11px', color: '#64748b' }}>{cost.project_id}</div>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '12px' }}>
                                  <span style={{ color: '#94a3b8' }}>Spent</span>
                                  <span style={{ color: '#fbbf24', fontWeight: 600 }}>{formatCost(cost.total_cost)}</span>
                                </div>
                                {cost.budget > 0 && (
                                  <>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', fontSize: '12px' }}>
                                      <span style={{ color: '#94a3b8' }}>Budget</span>
                                      <span style={{ fontWeight: 500 }}>{formatCost(cost.budget)}</span>
                                    </div>
                                    <div style={{
                                      width: '100%',
                                      height: '6px',
                                      background: '#1e293b',
                                      borderRadius: '3px',
                                      overflow: 'hidden',
                                      marginBottom: '6px'
                                    }}>
                                      <div style={{
                                        width: `${Math.min(percentage, 100)}%`,
                                        height: '100%',
                                        background: status.color,
                                        transition: 'width 0.3s ease'
                                      }} />
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '11px' }}>
                                      <span>{status.indicator}</span>
                                      <span style={{ color: status.color }}>{Math.round(percentage)}% utilized</span>
                                    </div>
                                  </>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Cost Efficiency & Optimization */}
                      <div>
                        {/* Cost Efficiency Metrics */}
                        <div style={{
                          background: '#1e293b',
                          borderRadius: '12px',
                          padding: '20px',
                          border: '1px solid #334155',
                          marginBottom: '16px'
                        }}>
                          <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: 600 }}>Cost Efficiency</h2>
                          {(() => {
                            const efficiency = calculateCostEfficiency();
                            return (
                              <>
                                <div style={{
                                  background: '#0f172a',
                                  borderRadius: '8px',
                                  padding: '12px',
                                  marginBottom: '8px'
                                }}>
                                  <div style={{ fontSize: '11px', color: '#94a3b8', marginBottom: '4px' }}>Avg Cost / Project</div>
                                  <div style={{ fontSize: '20px', fontWeight: 700, color: '#fbbf24' }}>
                                    {formatCost(efficiency.avgCostPerProject)}
                                  </div>
                                </div>
                                <div style={{
                                  background: '#0f172a',
                                  borderRadius: '8px',
                                  padding: '12px',
                                  marginBottom: '8px'
                                }}>
                                  <div style={{ fontSize: '11px', color: '#94a3b8', marginBottom: '4px' }}>Cost / 1K Tokens</div>
                                  <div style={{ fontSize: '20px', fontWeight: 700, color: '#fbbf24' }}>
                                    {formatCost(efficiency.costPer1KTokens)}
                                  </div>
                                </div>
                                <div style={{
                                  background: '#0f172a',
                                  borderRadius: '8px',
                                  padding: '12px'
                                }}>
                                  <div style={{ fontSize: '11px', color: '#94a3b8', marginBottom: '4px' }}>Total Tokens</div>
                                  <div style={{ fontSize: '20px', fontWeight: 700, color: '#3b82f6' }}>
                                    {efficiency.totalTokens.toLocaleString()}
                                  </div>
                                </div>
                              </>
                            );
                          })()}
                        </div>

                        {/* Optimization Tips */}
                        <div style={{
                          background: '#1e293b',
                          borderRadius: '12px',
                          padding: '20px',
                          border: '1px solid #334155'
                        }}>
                          <h2 style={{ margin: '0 0 12px 0', fontSize: '16px', fontWeight: 600 }}>💡 Optimization Tips</h2>
                          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', fontSize: '12px', color: '#94a3b8' }}>
                            <div style={{ display: 'flex', gap: '8px' }}>
                              <span style={{ color: '#22c55e' }}>✓</span>
                              <span>Use Haiku for simple tasks</span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px' }}>
                              <span style={{ color: '#22c55e' }}>✓</span>
                              <span>Cache frequently used prompts</span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px' }}>
                              <span style={{ color: '#22c55e' }}>✓</span>
                              <span>Set project budgets proactively</span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px' }}>
                              <span style={{ color: '#22c55e' }}>✓</span>
                              <span>Monitor cost trends daily</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}

            {/* Activity Tab */}
            {activeTab === 'activity' && (
              <div style={{
                background: '#1e293b',
                borderRadius: '12px',
                padding: '20px',
                border: '1px solid #334155'
              }}>
                <h2 style={{ margin: '0 0 16px 0', fontSize: '16px', fontWeight: 600 }}>
                  All Activity ({activity.length} events)
                </h2>
                {activity.length === 0 ? (
                  <div style={{
                    padding: '40px',
                    textAlign: 'center',
                    color: '#64748b',
                    fontSize: '14px'
                  }}>
                    No activity logged yet.
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                    {activity.map((item, i) => {
                      const agent = getAgent(item.agent);
                      return (
                        <div key={i} style={{
                          display: 'flex',
                          alignItems: 'center',
                          gap: '16px',
                          padding: '16px',
                          background: '#0f172a',
                          borderRadius: '8px',
                          borderLeft: `3px solid ${
                            item.type === 'blocked' ? '#ef4444' :
                            item.type === 'approved' ? '#22c55e' :
                            item.type === 'complete' ? '#3b82f6' : agent.color
                          }`
                        }}>
                          <div style={{
                            fontSize: '24px',
                            width: '44px',
                            height: '44px',
                            background: `${agent.color}20`,
                            borderRadius: '10px',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                          }}>
                            {agent.icon}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: '14px', fontWeight: 500, marginBottom: '4px' }}>{item.action}</div>
                            <div style={{ display: 'flex', gap: '16px', fontSize: '12px', color: '#64748b' }}>
                              <span>{agent.name}</span>
                              <span>{item.project}</span>
                            </div>
                          </div>
                          <div style={{ textAlign: 'right' }}>
                            <div style={{ fontSize: '12px', color: '#94a3b8' }}>
                              {new Date(item.timestamp).toLocaleDateString()}
                            </div>
                            <div style={{ fontSize: '12px', color: '#64748b' }}>
                              {new Date(item.timestamp).toLocaleTimeString()}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </div>

          {/* Footer */}
          <div style={{
            padding: '16px 24px',
            borderTop: '1px solid #334155',
            background: '#1e293b',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            fontSize: '12px',
            color: '#64748b'
          }}>
            <div>
              AI-SDLC Framework v2.1.1 • Auto-refresh: 3s • Registry: {registry ? '✅ Connected' : '⚠️ Not Connected'} • Costs: {costs.length > 0 ? `✅ ${costs.length} projects` : '⚠️ No data'}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
              <Zap size={14} style={{ color: '#22c55e' }} />
              <span>Speed • Clarity • Control</span>
            </div>
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SDLCControlCenter />);
  </script>
</body>
</html>
